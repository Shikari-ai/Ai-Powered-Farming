# Copies the repo (minus .git / .github) into branch "gh-pages" for GitHub Pages.
#
# One-time: Actions → General → Workflow permissions → Read and write
#           Settings → Pages → Deploy from branch gh-pages / (root)

name: Deploy to gh-pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

concurrency:
  group: gh-pages-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Prepare site files (no .git / .github)
        run: |
          mkdir -p _site
          rsync -a --exclude='.git' --exclude='.github' ./ _site/

      - name: Push to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: _site
          force_orphan: true
