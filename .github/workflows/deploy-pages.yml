# Copies the repo (minus .git / .github) into branch "gh-pages" for GitHub Pages.
#
# One-time setup:
# 1. Settings → Actions → General → Workflow permissions → "Read and write permissions" → Save
# 2. Settings → Pages → Source: Deploy from a branch → Branch: gh-pages, folder: / (root) → Save
# 3. Push to main. Site: https://<account>.github.io/<repo>/
#
# Firebase: Authorized domains → add <account>.github.io

name: Deploy to gh-pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: gh-pages-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare site files (no .git / .github)
        run: |
          mkdir -p _site
          rsync -a --exclude='.git' --exclude='.github' ./ _site/

      - name: Push to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: _site
          force_orphan: true
