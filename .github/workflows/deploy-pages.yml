# Optional: pushes static site to gh-pages. Primary production hosting is Firebase
# (https://agritech-4d1ba.web.app). Run this workflow manually if you use GitHub Pages.

name: Deploy to gh-pages

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

concurrency:
  group: gh-pages-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Prepare site files
        run: |
          mkdir -p _site
          rsync -a --exclude='.git' --exclude='.github' ./ _site/

      - name: Push to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: _site
          force_orphan: true
