# Deploy to https://agritech-4d1ba.web.app
# Secret: FIREBASE_SERVICE_ACCOUNT = full JSON from Firebase Console → Project settings →
# Service accounts → Generate new private key (paste whole file; one line or multiline is fine).

name: Deploy Firebase Hosting

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      # One shell: write SA key, export GOOGLE_APPLICATION_CREDENTIALS, install CLI, deploy.
      # Split steps sometimes lose ADC for firebase-tools; composite actions also break env chaining.
      - name: Deploy Hosting
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          set -euo pipefail
          if [ -z "${FIREBASE_SERVICE_ACCOUNT:-}" ]; then
            echo "::error::Add repository secret FIREBASE_SERVICE_ACCOUNT (service account JSON key)."
            exit 1
          fi
          CREDS="${GITHUB_WORKSPACE}/firebase-ci-sa.json"
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > "$CREDS"
          python3 -c "
          import json, sys
          with open(sys.argv[1], encoding='utf-8') as f:
            d = json.load(f)
          assert d.get('type') == 'service_account', 'Not a service account key JSON'
          assert d.get('private_key'), 'Invalid key JSON'
          print('Using service account:', d.get('client_email', ''))
          " "$CREDS"
          export GOOGLE_APPLICATION_CREDENTIALS="$CREDS"
          npm install -g firebase-tools
          firebase deploy --only hosting --project agritech-4d1ba --non-interactive
