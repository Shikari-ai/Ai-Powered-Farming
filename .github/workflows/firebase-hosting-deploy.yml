# Deploy to https://agritech-4d1ba.web.app
# Secret: FIREBASE_SERVICE_ACCOUNT (Firebase Console → Project settings → Service accounts → Generate key)

name: Deploy Firebase Hosting

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy Hosting
        env:
          SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          set -euo pipefail
          if [ -z "${SERVICE_ACCOUNT_JSON:-}" ]; then
            echo "::error::Missing Actions secret FIREBASE_SERVICE_ACCOUNT"
            exit 1
          fi
          printf '%s' "$SERVICE_ACCOUNT_JSON" > "$GITHUB_WORKSPACE/serviceAccount.json"
          export GOOGLE_APPLICATION_CREDENTIALS="$GITHUB_WORKSPACE/serviceAccount.json"
          firebase deploy --only hosting --project agritech-4d1ba --non-interactive
