# Deploy to https://agritech-4d1ba.web.app on push to main.
#
# Secret: FIREBASE_SERVICE_ACCOUNT (full JSON from Firebase → Project settings → Service accounts)
#
# If Actions still warns about "FirebaseExtended/action-hosting-deploy", delete any EXTRA workflow
# Firebase may have added under .github/workflows/ (e.g. firebase-hosting-merge.yml) on GitHub.

name: Deploy Firebase Hosting

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy Hosting
        env:
          SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          set -e
          if [ -z "$SERVICE_ACCOUNT_JSON" ]; then
            echo "Missing secret FIREBASE_SERVICE_ACCOUNT. Add it under Settings → Secrets → Actions."
            exit 1
          fi
          echo "$SERVICE_ACCOUNT_JSON" > "${GITHUB_WORKSPACE}/serviceAccount.json"
          export GOOGLE_APPLICATION_CREDENTIALS="${GITHUB_WORKSPACE}/serviceAccount.json"
          firebase deploy --only hosting --project agritech-4d1ba --non-interactive
