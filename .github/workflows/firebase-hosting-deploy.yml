# Deploy to Firebase Hosting (https://<project>.web.app) on every push to main.
#
# One-time: GitHub repo → Settings → Secrets and variables → Actions → New repository secret
#   Name:  FIREBASE_SERVICE_ACCOUNT
#   Value: full JSON from Firebase Console → Project settings → Service accounts →
#          Generate new private key (for project agritech-4d1ba)
#
# Then: Firebase Console → Authentication → Settings → Authorized domains → add:
#   agritech-4d1ba.web.app
#   agritech-4d1ba.firebaseapp.com

name: Deploy Firebase Hosting

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: agritech-4d1ba
          channelId: live
