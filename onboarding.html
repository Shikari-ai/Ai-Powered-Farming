<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#140508">
  <title>Welcome — Smart Farming</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css">
  <style>
    :root {
      --bg: #0a0506;
      --crimson: #DC143C;
      --crimson-bright: #FF3355;
      --crimson-dim: rgba(220, 20, 60, 0.15);
      --crimson-glow: rgba(220, 20, 60, 0.45);
      --glass: rgba(255, 255, 255, 0.06);
      --text: #FAF5F6;
      --text-dim: rgba(255, 245, 246, 0.55);
      --border: rgba(220, 20, 60, 0.22);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: 'Outfit', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
      opacity: 0;
      transition: opacity 0.45s ease;
    }
    body.ob-ready { opacity: 1; }

    .ob-root {
      position: fixed;
      inset: 0;
      overflow: hidden;
    }

    /* Ambient video */
    .ob-video-wrap {
      position: absolute;
      inset: -2px;
      z-index: 0;
    }
    .ob-video-wrap video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: saturate(1.05) brightness(0.45);
    }
    .ob-video-fallback {
      position: absolute;
      inset: 0;
      background: url('https://images.unsplash.com/photo-1500382017468-9049fed747ef?w=1200&q=80') center/cover;
      opacity: 0.5;
    }
    .ob-veil {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 120% 80% at 50% 100%, rgba(220, 20, 60, 0.18), transparent 55%),
        linear-gradient(180deg, rgba(10, 5, 6, 0.75) 0%, rgba(10, 5, 6, 0.92) 100%);
      z-index: 1;
    }

    /* Film grain */
    .ob-grain {
      position: absolute;
      inset: 0;
      z-index: 2;
      opacity: 0.07;
      pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    }

    .ob-ui {
      position: relative;
      z-index: 10;
      height: 100%;
      display: flex;
      flex-direction: column;
      padding: calc(14px + env(safe-area-inset-top)) 20px calc(22px + env(safe-area-inset-bottom));
      max-width: 480px;
      margin: 0 auto;
    }

    .ob-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .ob-brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .ob-logo {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--crimson-dim), rgba(255, 51, 85, 0.12));
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--crimson-bright);
      font-size: 20px;
      box-shadow: 0 0 24px var(--crimson-glow);
    }
    .ob-brand small {
      display: block;
      font-size: 9px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-dim);
      font-weight: 600;
    }
    .ob-brand strong {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .ob-skip {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-dim);
      background: var(--glass);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 8px 14px;
      border-radius: 999px;
      cursor: pointer;
      transition: transform 0.15s, background 0.2s, color 0.2s;
    }
    .ob-skip:active {
      transform: scale(0.96);
      color: var(--text);
      background: rgba(220, 20, 60, 0.12);
    }

    .ob-progress-rail {
      height: 3px;
      border-radius: 3px;
      background: rgba(255, 255, 255, 0.08);
      margin-bottom: 18px;
      overflow: hidden;
    }
    .ob-progress-rail::after {
      content: '';
      display: block;
      height: 100%;
      width: var(--p, 25%);
      background: linear-gradient(90deg, var(--crimson), var(--crimson-bright));
      box-shadow: 0 0 12px var(--crimson-glow);
      border-radius: 3px;
      transition: width 0.35s cubic-bezier(0.34, 1.1, 0.64, 1);
    }

    #ob-phase-slides {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }
    #ob-phase-slides.hidden { display: none !important; }

    .ob-touch-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-height: 0;
      touch-action: pan-y;
    }

    .ob-glass {
      background: linear-gradient(145deg, rgba(255, 255, 255, 0.09), rgba(255, 255, 255, 0.03));
      border: 1px solid rgba(220, 20, 60, 0.25);
      border-radius: 24px;
      padding: 28px 22px;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow:
        0 4px 32px rgba(0, 0, 0, 0.35),
        0 0 0 1px rgba(255, 255, 255, 0.04) inset,
        0 0 48px rgba(220, 20, 60, 0.12);
      position: relative;
      overflow: hidden;
    }
    .ob-glass::before {
      content: '';
      position: absolute;
      top: -40%;
      right: -30%;
      width: 70%;
      height: 70%;
      background: radial-gradient(circle, rgba(220, 20, 60, 0.2), transparent 65%);
      pointer-events: none;
    }

    .ob-slide-wrap {
      position: relative;
      z-index: 1;
    }
    .ob-slide-wrap.ob-fade-in {
      animation: obFade 0.42s cubic-bezier(0.22, 1, 0.36, 1) both;
    }
    @keyframes obFade {
      from { opacity: 0; transform: translateY(14px) scale(0.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .ob-icon-ring {
      width: 72px;
      height: 72px;
      border-radius: 20px;
      margin: 0 auto 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 34px;
      color: var(--crimson-bright);
      background: rgba(220, 20, 60, 0.12);
      border: 1px solid var(--border);
      box-shadow: 0 0 28px rgba(220, 20, 60, 0.25);
    }

    #ob-slide-title {
      font-size: 22px;
      font-weight: 800;
      text-align: center;
      line-height: 1.2;
      margin-bottom: 12px;
      letter-spacing: -0.03em;
      background: linear-gradient(90deg, #fff, #ffc8d4);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    #ob-slide-sub {
      font-size: 14px;
      line-height: 1.55;
      text-align: center;
      color: var(--text-dim);
      font-weight: 500;
    }

    .ob-dots {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-top: 22px;
    }
    .ob-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.2);
      border: none;
      padding: 0;
      cursor: pointer;
      transition: all 0.25s;
    }
    .ob-dot.active {
      width: 26px;
      border-radius: 4px;
      background: linear-gradient(90deg, var(--crimson), var(--crimson-bright));
      box-shadow: 0 0 12px var(--crimson-glow);
    }

    .ob-next {
      margin-top: 20px;
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 16px;
      font-size: 15px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      color: #fff;
      background: linear-gradient(135deg, var(--crimson), #9e0b24);
      box-shadow: 0 8px 28px rgba(220, 20, 60, 0.35);
      transition: transform 0.12s, box-shadow 0.2s;
    }
    .ob-next:active {
      transform: scale(0.98);
      box-shadow: 0 4px 16px rgba(220, 20, 60, 0.4);
    }

    .ob-hint {
      text-align: center;
      font-size: 11px;
      color: rgba(255, 255, 255, 0.35);
      margin-top: 12px;
    }

    /* Language phase */
    #ob-phase-lang {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }
    #ob-phase-lang.hidden { display: none !important; }

    .ob-lang-head {
      text-align: center;
      margin-bottom: 16px;
    }
    .ob-lang-head h2 {
      font-size: 22px;
      font-weight: 800;
      margin-bottom: 6px;
    }
    .ob-lang-head p {
      font-size: 13px;
      color: var(--text-dim);
    }

    #ob-lang-grid {
      flex: 1;
      overflow-y: auto;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      align-content: start;
      padding-bottom: 8px;
      -webkit-overflow-scrolling: touch;
    }
    #ob-lang-grid::-webkit-scrollbar { width: 0; }

    .ob-lang-card {
      padding: 14px 12px;
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: var(--glass);
      cursor: pointer;
      text-align: center;
      transition: transform 0.12s, border-color 0.2s, box-shadow 0.2s, background 0.2s;
    }
    .ob-lang-card:active { transform: scale(0.97); }
    .ob-lang-card.selected {
      border-color: var(--crimson);
      background: rgba(220, 20, 60, 0.14);
      box-shadow: 0 0 20px rgba(220, 20, 60, 0.2);
    }
    .ob-lang-native {
      display: block;
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .ob-lang-en {
      font-size: 11px;
      color: var(--text-dim);
    }

    #ob-finish {
      margin-top: 14px;
      width: 100%;
      padding: 16px;
      border-radius: 16px;
      border: 1px solid rgba(220, 20, 60, 0.5);
      font-size: 15px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      color: #fff;
      background: linear-gradient(135deg, var(--crimson-bright), var(--crimson));
      box-shadow: 0 8px 28px rgba(220, 20, 60, 0.35);
    }
    #ob-finish:disabled { opacity: 0.5; pointer-events: none; }

    @media (prefers-reduced-motion: reduce) {
      .ob-slide-wrap.ob-fade-in { animation: none; }
      .ob-video-wrap video { display: none; }
    }
  </style>
</head>
<body>
  <div class="ob-root">
    <div class="ob-video-wrap" aria-hidden="true">
      <div class="ob-video-fallback" id="ob-poster-fallback"></div>
      <video id="ob-video" autoplay muted loop playsinline preload="metadata"
        poster="https://images.unsplash.com/photo-1500382017468-9049fed747ef?w=800&q=75">
        <source src="https://videos.pexels.com/video-files/2491284/2491284_sd_640_360_25fps.mp4" type="video/mp4">
      </video>
    </div>
    <div class="ob-veil"></div>
    <div class="ob-grain"></div>

    <div class="ob-ui">
      <div id="ob-phase-slides">
        <div class="ob-top">
          <div class="ob-brand">
            <div class="ob-logo"><i class="ri-leaf-fill"></i></div>
            <div>
              <small>Smart Farming</small>
              <strong>AI for tomorrow</strong>
            </div>
          </div>
          <button type="button" class="ob-skip" id="ob-skip">Skip</button>
        </div>

        <div class="ob-progress-rail" id="ob-progress" style="--p: 25%;"></div>

        <div class="ob-touch-panel" id="ob-touch-panel">
          <div class="ob-glass">
            <div class="ob-slide-wrap ob-fade-in" id="ob-slide-wrap">
              <div class="ob-icon-ring"><i id="ob-slide-icon" class="ri-earth-line"></i></div>
              <h1 id="ob-slide-title">…</h1>
              <p id="ob-slide-sub">…</p>
            </div>
            <div class="ob-dots" id="ob-dots">
              <button type="button" class="ob-dot active" aria-label="Slide 1"></button>
              <button type="button" class="ob-dot" aria-label="Slide 2"></button>
              <button type="button" class="ob-dot" aria-label="Slide 3"></button>
              <button type="button" class="ob-dot" aria-label="Slide 4"></button>
            </div>
            <button type="button" class="ob-next" id="ob-next">Next</button>
            <p class="ob-hint">Swipe left or right · Sound after first touch</p>
          </div>
        </div>
      </div>

      <div id="ob-phase-lang" class="hidden">
        <div class="ob-lang-head">
          <h2>Your language</h2>
          <p>Choose how the app speaks to you. You can change this anytime in Profile.</p>
        </div>
        <div id="ob-lang-grid"></div>
        <button type="button" id="ob-finish">Enter dashboard</button>
      </div>
    </div>
  </div>

  <script>
    (function () {
      var v = document.getElementById("ob-video");
      if (v) v.addEventListener("error", function () { v.style.display = "none"; });
    })();
  </script>
  <script type="module" src="js/onboarding.js?v=1"></script>
</body>
</html>
