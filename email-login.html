<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script>
    (function () {
      var h = location.hostname || "";
      if (!h.endsWith("github.io")) return;
      var path = location.pathname;
      var parts = path.split("/").filter(Boolean);
      var repo = parts[0];
      if (!repo || repo.indexOf(".") !== -1) return;
      if (path === "/" + repo) {
        location.replace("/" + repo + "/" + location.search + location.hash);
        return;
      }
      var b = document.createElement("base");
      b.href = "/" + repo + "/";
      var head = document.head || document.getElementsByTagName("head")[0];
      if (head) head.insertBefore(b, head.firstChild);
    })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Log In - AgriTech AI</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        .input-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; text-align: left; }
        .input-group label { font-size: 13px; color: rgba(255,255,255,0.8); margin-left: 4px; }
        .input-group input { background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.1); padding: 16px; border-radius: 16px; color: white; font-family: 'Outfit', sans-serif; font-size: 16px; outline: none; transition: border-color 0.2s; }
        .input-group input:focus { border-color: var(--accent-green); }
    </style>
</head>
<body class="dark-theme flex-center">
    <div class="mobile-container login-mode">
        
        <button onclick="window.history.back()" class="icon-btn" style="position: absolute; top: 20px; left: 20px; z-index: 10;">
            <i class="ri-arrow-left-line" style="font-size: 24px;"></i>
        </button>

        <div class="login-wrapper slide-up" style="margin-top: 20px;">
            <div class="logo-area">
                <h2 style="font-size: 28px;">Welcome Back</h2>
                <p>Log in to your account</p>
            </div>
            
            <div class="login-panel glass-panel" style="padding: 32px 24px;">
                <form id="login-form" onsubmit="event.preventDefault(); handleLogin();">
                    <div class="input-group">
                        <label>Email Address</label>
                        <input type="email" id="li-email" required placeholder="john@farm.com">
                    </div>
                    <div class="input-group">
                        <label>Password</label>
                        <input type="password" id="li-password" required placeholder="••••••••">
                    </div>
                    
                    <div style="text-align: right; margin-bottom: 24px;">
                        <a href="#" onclick="handleForgotPassword(event)" style="color: var(--text-muted); font-size: 13px; text-decoration: none;">Forgot Password?</a>
                    </div>
                    
                    <button type="submit" class="primary-btn" style="width: 100%;">Log In</button>
                </form>
                
                <p style="font-size: 14px; color: rgba(255,255,255,0.7); margin-top: 32px;">
                    Don't have an account? <a href="signup.html" style="color: var(--accent-green); font-weight: 600; text-decoration: none;">Sign Up</a>
                </p>
            </div>
        </div>
    </div>
    
    <script type="module">
        import './js/auth-session.js';
        import { loginWithEmailPwd, auth } from './js/auth.js';
        import { sendPasswordResetEmail } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';

        window.handleLogin = () => {
            const email = document.getElementById('li-email').value;
            const password = document.getElementById('li-password').value;
            loginWithEmailPwd(email, password);
        };

        window.handleForgotPassword = async (e) => {
            e.preventDefault();
            const email = (document.getElementById('li-email')?.value || '').trim();
            if (!email) {
                alert('Enter your email address above first, then tap Forgot Password.');
                return;
            }
            try {
                await sendPasswordResetEmail(auth, email);
                alert('Reset link sent to ' + email + '. Check your inbox (and spam folder).');
            } catch (err) {
                alert('Error: ' + (err.message || 'Could not send reset email.'));
            }
        };
    </script>
</body>
</html>
