<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <script>
  (function () {
    var h = location.hostname || "";
    if (!h.endsWith("github.io")) return;
    var path = location.pathname;
    var parts = path.split("/").filter(Boolean);
    var repo = parts[0];
    if (!repo || repo.indexOf(".") !== -1) return;
    if (path === "/" + repo) {
      location.replace("/" + repo + "/" + location.search + location.hash);
      return;
    }
    var b = document.createElement("base");
    b.href = "/" + repo + "/";
    var hd = document.head || document.getElementsByTagName("head")[0];
    if (hd) hd.insertBefore(b, hd.firstChild);
  })();
  </script>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta http-equiv="refresh" content="0;url=fields.html">
  <title>Farm OS — Redirect</title>
  <script>location.replace("fields.html");</script>
</head>
<body>
  <p><a href="fields.html">Continue to Fields</a></p>
</body>
</html>
