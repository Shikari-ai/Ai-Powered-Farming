<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script>
    (function () {
      var h = location.hostname || "";
      if (!h.endsWith("github.io")) return;
      var path = location.pathname;
      var parts = path.split("/").filter(Boolean);
      var repo = parts[0];
      if (!repo || repo.indexOf(".") !== -1) return;
      if (path === "/" + repo) {
        location.replace("/" + repo + "/" + location.search + location.hash);
        return;
      }
      var b = document.createElement("base");
      b.href = "/" + repo + "/";
      var head = document.head || document.getElementsByTagName("head")[0];
      if (head) head.insertBefore(b, head.firstChild);
    })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Authentication - AgriTech AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        :root {
            --emerald: #34d399;
            --neon-green: #10b981;
            --neon-glow: rgba(16, 185, 129, 0.4);
            --dark-glass: rgba(15, 23, 42, 0.6);
            --border-glass: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }

        body {
            background-color: #020617;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            overflow-x: hidden;
        }

        /* ─── Background ─── */
        .auth-bg {
            position: fixed; top: -5%; left: -5%; right: -5%; bottom: -5%;
            background: url('https://images.unsplash.com/photo-1625246333195-78d9c38ad449?q=80&w=1080&auto=format&fit=crop') center/cover;
            z-index: 0;
            filter: brightness(0.8) contrast(1.1);
            transition: transform 0.12s ease-out;
            will-change: transform;
        }
        .auth-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(180deg, rgba(2,6,23,0.1) 0%, rgba(2,6,23,0.8) 40%, #020617 100%);
            z-index: 1;
        }

        /* ─── Particles ─── */
        .particles { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; pointer-events: none; }
        .particle {
            position: absolute; border-radius: 50%; opacity: 0;
            animation: particleFloat linear infinite;
        }
        @keyframes particleFloat {
            0%   { transform: translateY(0) translateX(0) scale(0); opacity: 0; }
            15%  { opacity: 0.9; transform: scale(1); }
            85%  { opacity: 0.6; }
            100% { transform: translateY(-120px) translateX(30px) scale(0.3); opacity: 0; }
        }

        /* ─── Container ─── */
        .auth-container {
            position: relative; z-index: 10;
            width: 100%; max-width: 440px;
            min-height: 100vh;
            display: flex; flex-direction: column;
            padding: 40px 24px 32px;
        }

        /* ─── Header ─── */
        .auth-header {
            display: flex; flex-direction: column; align-items: center; text-align: center;
            margin-bottom: 36px;
            animation: slideDown 0.9s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .logo-ring {
            width: 76px; height: 76px; border-radius: 50%;
            background: rgba(16, 185, 129, 0.08);
            border: 1px solid rgba(16, 185, 129, 0.3);
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 40px var(--neon-glow), inset 0 0 20px rgba(16,185,129,0.15);
            margin-bottom: 16px; position: relative;
            transition: box-shadow 0.4s;
            cursor: default;
        }
        .logo-ring:hover {
            box-shadow: 0 0 60px rgba(16,185,129,0.6), inset 0 0 30px rgba(16,185,129,0.25);
        }
        .logo-ring::after {
            content: ''; position: absolute; top: -6px; left: -6px; right: -6px; bottom: -6px;
            border-radius: 50%; border: 1px dashed rgba(16,185,129,0.35);
            animation: spin 18s linear infinite;
        }
        .logo-ring::before {
            content: ''; position: absolute; top: -12px; left: -12px; right: -12px; bottom: -12px;
            border-radius: 50%; border: 1px dashed rgba(16,185,129,0.15);
            animation: spin 30s linear infinite reverse;
        }
        .logo-ring i { font-size: 38px; color: var(--emerald); filter: drop-shadow(0 0 10px var(--emerald)); }
        .auth-header h1 { font-size: 28px; font-weight: 500; letter-spacing: -0.5px; margin-bottom: 4px; }
        .auth-header h1 span { color: var(--emerald); font-weight: 700; }
        .auth-header p { font-size: 12px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 2.5px; }

        /* ─── Glass Card ─── */
        .glass-card {
            background: rgba(15, 23, 42, 0.5);
            backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--border-glass);
            border-radius: 32px;
            padding: 32px 24px 28px;
            box-shadow: 0 24px 48px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.08);
            position: relative; overflow: hidden;
            animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            transform-style: preserve-3d;
            will-change: transform;
            transition: box-shadow 0.3s;
        }
        .glass-card::before {
            content: ''; position: absolute; top: 0; left: 50%; transform: translateX(-50%);
            width: 60%; height: 1px;
            background: linear-gradient(90deg, transparent, var(--emerald), transparent);
            opacity: 0.4;
        }
        /* Corner glow accents */
        .glass-card::after {
            content: ''; position: absolute; bottom: -40px; right: -40px;
            width: 120px; height: 120px; border-radius: 50%;
            background: radial-gradient(circle, rgba(16,185,129,0.12) 0%, transparent 70%);
            pointer-events: none;
        }

        /* ─── Dynamic Header ─── */
        #dynamic-header { margin-bottom: 24px; min-height: 60px; }
        .welcome-text { font-size: 23px; font-weight: 600; margin-bottom: 5px; }
        .sub-text { font-size: 13px; color: var(--text-dim); }
        .header-anim { animation: headerSlide 0.4s cubic-bezier(0.16,1,0.3,1); }
        @keyframes headerSlide {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ─── Tabs ─── */
        .auth-tabs {
            display: flex; position: relative; margin-bottom: 28px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        .tab-btn {
            flex: 1; background: none; border: none; padding: 12px 0;
            color: var(--text-dim); font-size: 13px; font-weight: 600; letter-spacing: 1.2px;
            cursor: pointer; transition: color 0.3s, transform 0.15s; position: relative; overflow: hidden;
        }
        .tab-btn.active { color: white; }
        .tab-btn:active { transform: scale(0.95); }
        .tab-indicator {
            position: absolute; bottom: -1px; left: 0; width: 50%; height: 2px;
            background: var(--neon-green); box-shadow: 0 0 12px var(--neon-green);
            transition: transform 0.45s cubic-bezier(0.16, 1, 0.3, 1);
            border-radius: 2px;
        }

        /* ─── Forms Wrapper (sliding) ─── */
        .forms-wrapper {
            position: relative; overflow: hidden;
            transition: height 0.45s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .form-section {
            position: absolute; top: 0; left: 0; width: 100%;
            transition: transform 0.45s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.35s ease;
        }
        .form-section.state-center { transform: translateX(0);     opacity: 1; pointer-events: all; }
        .form-section.state-left   { transform: translateX(-110%); opacity: 0; pointer-events: none; }
        .form-section.state-right  { transform: translateX(110%);  opacity: 0; pointer-events: none; }

        /* ─── Input Groups (floating labels) ─── */
        .input-group {
            background: rgba(0,0,0,0.25);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 16px; padding: 10px 16px;
            display: flex; align-items: center; gap: 14px;
            margin-bottom: 14px;
            transition: border-color 0.3s, background 0.3s, box-shadow 0.3s;
            position: relative; overflow: hidden;
        }
        .input-group:focus-within {
            border-color: rgba(16, 185, 129, 0.5);
            background: rgba(0,0,0,0.45);
            box-shadow: 0 0 0 3px rgba(16,185,129,0.08), 0 0 20px rgba(16,185,129,0.06);
        }
        .input-group.valid {
            border-color: rgba(16,185,129,0.4);
        }
        /* Shimmer sweep on focus */
        .input-group::after {
            content: ''; position: absolute; top: 0; left: -100%; width: 60%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.04), transparent);
            transition: left 0.5s ease; pointer-events: none;
        }
        .input-group:focus-within::after { left: 150%; }

        .input-icon { color: var(--text-dim); font-size: 20px; flex-shrink: 0; transition: color 0.3s; }
        .input-group:focus-within .input-icon { color: var(--emerald); }

        .input-content { flex: 1; position: relative; padding-top: 16px; }
        .input-content label {
            position: absolute; left: 0; top: 50%; transform: translateY(-50%);
            font-size: 14px; color: rgba(255,255,255,0.3);
            transition: all 0.22s cubic-bezier(0.16,1,0.3,1); pointer-events: none;
            white-space: nowrap;
        }
        .input-content input {
            background: transparent; border: none; color: white;
            font-size: 15px; outline: none; width: 100%; padding-bottom: 2px;
            font-family: 'Outfit', sans-serif;
        }
        .input-content input::placeholder { color: transparent; }
        /* Float label up when focused or filled */
        .input-content input:focus ~ label,
        .input-content input:not(:placeholder-shown) ~ label {
            top: 0; transform: translateY(0);
            font-size: 10px; color: var(--emerald); letter-spacing: 0.5px;
        }
        .input-content input:focus::placeholder { color: rgba(255,255,255,0.15); }

        /* ─── Forgot Link ─── */
        .forgot-link {
            display: block; text-align: right; font-size: 12px; color: var(--emerald);
            text-decoration: none; margin-top: -2px; margin-bottom: 22px; font-weight: 500;
            transition: opacity 0.2s;
        }
        .forgot-link:active { opacity: 0.6; }

        /* ─── Primary Button ─── */
        .primary-btn {
            width: 100%; background: linear-gradient(90deg, #059669, #10b981);
            border: none; border-radius: 16px; padding: 4px 4px 4px 24px;
            display: flex; align-items: center; justify-content: space-between;
            color: white; font-size: 16px; font-weight: 600; cursor: pointer;
            box-shadow: 0 10px 28px rgba(16,185,129,0.3);
            transition: transform 0.25s, box-shadow 0.25s;
            position: relative; overflow: hidden;
        }
        .primary-btn:hover { transform: translateY(-2px); box-shadow: 0 16px 32px rgba(16,185,129,0.4); }
        .primary-btn:active { transform: translateY(1px) scale(0.99); }
        /* Shine sweep on hover */
        .primary-btn::after {
            content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.22), transparent);
            transform: skewX(-20deg); transition: left 0.55s ease;
        }
        .primary-btn:hover::after { left: 160%; }
        .btn-arrow {
            width: 46px; height: 46px; background: white; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            color: #059669; font-size: 20px; flex-shrink: 0;
            transition: transform 0.2s;
        }
        .primary-btn:hover .btn-arrow { transform: translateX(3px); }

        /* ─── Ripple Effect ─── */
        .ripple {
            position: absolute; border-radius: 50%;
            transform: scale(0); animation: rippleAnim 0.55s linear forwards;
            pointer-events: none; z-index: 50;
        }
        @keyframes rippleAnim {
            to { transform: scale(4); opacity: 0; }
        }

        /* ─── Spark Burst ─── */
        .spark {
            position: absolute; width: 5px; height: 5px;
            border-radius: 50%; pointer-events: none; z-index: 60;
            animation: sparkFly 0.55s ease-out forwards;
        }
        @keyframes sparkFly {
            0%   { transform: translate(0,0) scale(1.4); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
        }

        /* ─── Error shake ─── */
        @keyframes shake {
            0%,100% { transform: translateX(0); }
            20%     { transform: translateX(-7px); }
            40%     { transform: translateX(7px); }
            60%     { transform: translateX(-5px); }
            80%     { transform: translateX(5px); }
        }
        .shake { animation: shake 0.45s ease; }

        /* ─── Password Strength ─── */
        .strength-wrap { margin: -4px 0 14px; }
        .strength-bars { display: flex; gap: 5px; margin-bottom: 5px; }
        .s-bar {
            flex: 1; height: 3px; border-radius: 2px;
            background: rgba(255,255,255,0.08);
            transition: background 0.35s ease;
        }
        .strength-label { font-size: 11px; color: var(--text-dim); transition: color 0.3s; }

        /* ─── Divider ─── */
        .divider {
            display: flex; align-items: center; text-align: center;
            margin: 22px 0; color: var(--text-dim); font-size: 12px;
        }
        .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid rgba(255,255,255,0.08); }
        .divider::before { margin-right: 12px; }
        .divider::after  { margin-left:  12px; }

        /* ─── Social Buttons ─── */
        .social-btn {
            width: 100%; border: none; border-radius: 16px; padding: 14px;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            font-size: 15px; font-weight: 600; cursor: pointer;
            margin-bottom: 12px; position: relative; overflow: hidden;
            transition: transform 0.2s;
        }
        .social-btn:active { transform: scale(0.97); }

        /* Google */
        @property --g-angle { syntax: '<angle>'; initial-value: 0deg; inherits: false; }
        .social-btn.google-btn {
            padding: 2px; border-radius: 18px; z-index: 0; background: transparent;
            animation: googleOuterGlow 4s linear infinite;
            overflow: visible;
        }
        .social-btn.google-btn::before {
            content: ''; position: absolute; inset: -2px; z-index: -1; border-radius: 20px;
            --g-angle: 0deg;
            background: conic-gradient(
                from var(--g-angle),
                #EA4335 0deg, #FBBC05 35deg, #34A853 70deg, #4285F4 105deg,
                transparent 130deg, transparent 355deg, #EA4335 360deg
            );
            animation: googleClockwise 2.5s linear infinite;
        }
        .g-inner {
            display: flex; align-items: center; justify-content: center; gap: 10px;
            background: white; border-radius: 16px; padding: 12px 14px; width: 100%;
            color: #0f172a; font-size: 15px; font-weight: 600;
            position: relative; z-index: 1; overflow: hidden;
        }
        @keyframes googleClockwise { to { --g-angle: 360deg; } }
        @keyframes googleOuterGlow {
            0%,100% { box-shadow: 0 0 14px 3px rgba(234,67,53,0.5); }
            25%     { box-shadow: 0 0 14px 3px rgba(251,188,5,0.5); }
            50%     { box-shadow: 0 0 14px 3px rgba(52,168,83,0.5); }
            75%     { box-shadow: 0 0 14px 3px rgba(66,133,244,0.5); }
        }

        /* Apple */
        .social-btn.apple {
            background: #0d0d0d; color: white;
            border: 1px solid rgba(220,20,60,0.25);
            animation: applePulse 2.8s ease-in-out infinite;
        }
        .apple-icon { animation: crimsonShift 2.8s ease-in-out infinite; }
        @keyframes applePulse {
            0%,100% { box-shadow: 0 0 7px 1px rgba(220,20,60,0.25); border-color: rgba(220,20,60,0.25); }
            50%      { box-shadow: 0 0 20px 5px rgba(220,20,60,0.5); border-color: rgba(220,20,60,0.6); }
        }
        @keyframes crimsonShift {
            0%,100% { color: #DC143C; } 33% { color: #FF2D55; } 66% { color: #C0392B; }
        }

        /* ─── Security Badge ─── */
        .security-badge {
            margin-top: 28px; padding: 16px; border-radius: 16px;
            background: rgba(16,185,129,0.04); border: 1px solid rgba(16,185,129,0.1);
            display: flex; align-items: center; gap: 16px;
            animation: slideUp 1s cubic-bezier(0.16,1,0.3,1) 0.2s backwards;
        }
        .sec-icon {
            width: 40px; height: 40px; border-radius: 10px;
            background: rgba(16,185,129,0.1); display: flex; align-items: center; justify-content: center;
            color: var(--emerald); font-size: 20px; border: 1px solid rgba(16,185,129,0.2);
            flex-shrink: 0;
        }
        .sec-text h4 { font-size: 13px; font-weight: 500; margin-bottom: 2px; }
        .sec-text p  { font-size: 11px; color: var(--text-dim); line-height: 1.45; }

        /* ─── Toast Notification ─── */
        .login-toast {
            position: fixed; bottom: 28px; left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: #1e293b; color: white;
            padding: 13px 22px; border-radius: 14px;
            font-size: 13.5px; font-weight: 500;
            z-index: 9999; max-width: 88vw; text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
            opacity: 0; pointer-events: none;
            transition: transform 0.38s cubic-bezier(0.16,1,0.3,1), opacity 0.38s;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
        }
        .login-toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }
        .login-toast.success { border-color: rgba(52,211,153,0.45); color: #6ee7b7; }
        .login-toast.error   { border-color: rgba(239,68,68,0.45);  color: #fca5a5; }
        .login-toast.info    { border-color: rgba(96,165,250,0.45); color: #93c5fd; }

        /* ─── Spinner (loading state) ─── */
        @keyframes rotateSpin { to { transform: rotate(360deg); } }
        .spin { display: inline-block; animation: rotateSpin 0.7s linear infinite; }

        /* ─── Base keyframes ─── */
        @keyframes spin      { 100% { transform: rotate(360deg); } }
        @keyframes slideUp   { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-40px); } to { opacity: 1; transform: translateY(0); } }

        /* Terms checkbox */
        .terms-row {
            display: flex; gap: 10px; align-items: flex-start;
            margin-bottom: 22px; font-size: 12px; color: var(--text-dim);
        }
        .terms-row input[type=checkbox] { accent-color: var(--neon-green); margin-top: 2px; flex-shrink: 0; }
    </style>
</head>
<body>
    <div class="auth-bg" id="auth-bg"></div>
    <div class="auth-overlay"></div>
    <div class="particles" id="particles"></div>

    <!-- Toast -->
    <div class="login-toast" id="login-toast"></div>

    <div class="auth-container">

        <div class="auth-header">
            <div class="logo-ring"><i class="ri-leaf-fill"></i></div>
            <h1>Smart <span>Farming</span></h1>
            <p>AI Powered Agriculture</p>
        </div>

        <div class="glass-card" id="glass-card">
            <!-- Dynamic header -->
            <div id="dynamic-header">
                <h2 class="welcome-text">Welcome Back!</h2>
                <p class="sub-text">Sign in to continue your smart farming journey</p>
            </div>

            <!-- Tabs -->
            <div class="auth-tabs">
                <button class="tab-btn active" id="tab-signin" onclick="switchTab('signin')">SIGN IN</button>
                <button class="tab-btn"        id="tab-signup" onclick="switchTab('signup')">SIGN UP</button>
                <div class="tab-indicator" id="tab-indicator"></div>
            </div>

            <!-- Sliding forms -->
            <div class="forms-wrapper" id="forms-wrapper">

                <!-- SIGN IN -->
                <div id="signin-section" class="form-section state-center">
                    <form onsubmit="event.preventDefault(); submitSignIn();">
                        <div class="input-group">
                            <i class="ri-user-line input-icon"></i>
                            <div class="input-content">
                                <input type="email" id="si-email" required placeholder=" " autocomplete="email">
                                <label>Email Address</label>
                            </div>
                        </div>
                        <div class="input-group">
                            <i class="ri-lock-2-line input-icon"></i>
                            <div class="input-content">
                                <input type="password" id="si-password" required placeholder=" " autocomplete="current-password">
                                <label>Password</label>
                            </div>
                            <i class="ri-eye-off-line input-icon" style="cursor:pointer;flex-shrink:0;" onclick="togglePwd('si-password',this)"></i>
                        </div>
                        <a href="#" class="forgot-link" onclick="handleForgotPassword(event)">Forgot Password?</a>
                        <button type="submit" class="primary-btn" id="si-btn">
                            Sign In
                            <div class="btn-arrow"><i class="ri-arrow-right-line"></i></div>
                        </button>
                    </form>
                    <!-- padding so wrapper height accounts for bottom gap -->
                    <div style="height:4px;"></div>
                </div>

                <!-- SIGN UP -->
                <div id="signup-section" class="form-section state-right">
                    <form onsubmit="event.preventDefault(); submitSignUp();">
                        <div class="input-group">
                            <i class="ri-user-line input-icon"></i>
                            <div class="input-content">
                                <input type="text" id="su-name" required placeholder=" " autocomplete="name">
                                <label>Full Name</label>
                            </div>
                        </div>
                        <div class="input-group">
                            <i class="ri-mail-line input-icon"></i>
                            <div class="input-content">
                                <input type="email" id="su-email" required placeholder=" " autocomplete="email">
                                <label>Email Address</label>
                            </div>
                        </div>
                        <div class="input-group">
                            <i class="ri-lock-2-line input-icon"></i>
                            <div class="input-content">
                                <input type="password" id="su-password" required placeholder=" "
                                       autocomplete="new-password" oninput="checkStrength(this.value)">
                                <label>Password</label>
                            </div>
                            <i class="ri-eye-off-line input-icon" style="cursor:pointer;flex-shrink:0;" onclick="togglePwd('su-password',this)"></i>
                        </div>
                        <!-- Strength meter -->
                        <div class="strength-wrap" id="strength-wrap" style="display:none;">
                            <div class="strength-bars">
                                <div class="s-bar" id="sb0"></div>
                                <div class="s-bar" id="sb1"></div>
                                <div class="s-bar" id="sb2"></div>
                                <div class="s-bar" id="sb3"></div>
                            </div>
                            <div class="strength-label" id="strength-label"></div>
                        </div>
                        <div class="terms-row">
                            <input type="checkbox" required id="su-terms">
                            <label for="su-terms">I agree to the <span style="color:var(--emerald);">Terms of Service</span> and <span style="color:var(--emerald);">Privacy Policy</span></label>
                        </div>
                        <button type="submit" class="primary-btn" id="su-btn">
                            Create Account
                            <div class="btn-arrow"><i class="ri-arrow-right-line"></i></div>
                        </button>
                    </form>
                    <div style="height:4px;"></div>
                </div>

            </div><!-- /forms-wrapper -->

            <div class="divider">or continue with</div>

            <button type="button" class="social-btn google-btn" onclick="handleGoogleLogin()">
                <div class="g-inner">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" style="width:22px;height:22px;flex-shrink:0;">
                      <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
                      <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
                      <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
                      <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
                      <path fill="none" d="M0 0h48v48H0z"/>
                    </svg>
                    Continue with Google
                </div>
            </button>

            <button type="button" class="social-btn apple" onclick="handleGoogleLogin()">
                <i class="ri-apple-fill apple-icon" style="font-size:22px;"></i>
                Continue with Apple
            </button>

        </div><!-- /glass-card -->

        <!-- Trust Badge -->
        <div class="security-badge">
            <div class="sec-icon"><i class="ri-shield-check-fill"></i></div>
            <div class="sec-text">
                <h4>Your data is 100% secure</h4>
                <p>We use advanced military-grade encryption to protect your farm's sensitive information.</p>
            </div>
        </div>

    </div><!-- /auth-container -->

    <script type="module">
        import { auth, loginWithEmailPwd, signUpWithEmail, loginWithGoogle } from './js/auth.js';
        import { sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        /** Already signed in: go straight to dashboard. */
        (async function redirectIfAlreadySignedIn() {
            await auth.authStateReady();
            const path = location.pathname || '';
            if (!/login\.html$/i.test(path)) return;
            if (!auth.currentUser) return;
            try {
                const u = auth.currentUser;
                const name = u.displayName || (u.email ? u.email.split('@')[0] : 'Farmer');
                localStorage.setItem('agri_user', JSON.stringify({ name, email: u.email || '' }));
            } catch (_) {}
            window.location.replace('index.html');
        })();

        /* ══════════════════════════════════════
           TOAST
        ══════════════════════════════════════ */
        function toast(msg, type = 'info', duration = 4000) {
            const el = document.getElementById('login-toast');
            el.textContent = msg;
            el.className = `login-toast show ${type}`;
            clearTimeout(el._timer);
            el._timer = setTimeout(() => el.classList.remove('show'), duration);
        }

        /* ══════════════════════════════════════
           PARTICLES
        ══════════════════════════════════════ */
        const pContainer = document.getElementById('particles');
        const sparkColors = ['#34d399','#6ee7b7','#a7f3d0','#10b981','#fbbf24'];
        for (let i = 0; i < 20; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            const size = 2 + Math.random() * 4;
            const color = sparkColors[Math.floor(Math.random() * sparkColors.length)];
            p.style.cssText = `
                left:${Math.random()*100}%;
                top:${Math.random()*100}%;
                width:${size}px; height:${size}px;
                background:${color};
                box-shadow: 0 0 ${size*3}px ${color};
                animation-duration:${8+Math.random()*14}s;
                animation-delay:${Math.random()*12}s;
            `;
            pContainer.appendChild(p);
        }

        /* ══════════════════════════════════════
           BACKGROUND PARALLAX (desktop)
        ══════════════════════════════════════ */
        const authBg = document.getElementById('auth-bg');
        window.addEventListener('mousemove', (e) => {
            const x = (e.clientX / window.innerWidth  - 0.5) * 18;
            const y = (e.clientY / window.innerHeight - 0.5) * 10;
            authBg.style.transform = `translate(${x}px, ${y}px)`;
        });

        /* ══════════════════════════════════════
           CARD 3D TILT
        ══════════════════════════════════════ */
        const card = document.getElementById('glass-card');
        window.addEventListener('mousemove', (e) => {
            const rect = card.getBoundingClientRect();
            const cx = rect.left + rect.width  / 2;
            const cy = rect.top  + rect.height / 2;
            const dx = (e.clientX - cx) / (rect.width  / 2);
            const dy = (e.clientY - cy) / (rect.height / 2);
            card.style.transform = `perspective(1100px) rotateY(${dx * 4}deg) rotateX(${-dy * 3}deg)`;
            card.style.transition = 'transform 0.1s ease, box-shadow 0.3s';
        });
        window.addEventListener('mouseleave', () => {
            card.style.transform = 'perspective(1100px) rotateY(0deg) rotateX(0deg)';
            card.style.transition = 'transform 0.6s ease, box-shadow 0.3s';
        });
        // Touch tilt for mobile
        card.addEventListener('touchmove', (e) => {
            const t = e.touches[0];
            const rect = card.getBoundingClientRect();
            const dx = (t.clientX - rect.left - rect.width/2)  / (rect.width/2);
            const dy = (t.clientY - rect.top  - rect.height/2) / (rect.height/2);
            card.style.transform = `perspective(1100px) rotateY(${dx*3}deg) rotateX(${-dy*2}deg)`;
        }, { passive: true });
        card.addEventListener('touchend', () => {
            card.style.transform = '';
        });

        /* ══════════════════════════════════════
           RIPPLE
        ══════════════════════════════════════ */
        function addRipple(e, el, color = 'rgba(255,255,255,0.25)') {
            const rect = el.getBoundingClientRect();
            const size = Math.max(rect.width, rect.height) * 2.2;
            const x = (e.clientX || e.touches?.[0]?.clientX || rect.left + rect.width/2) - rect.left - size/2;
            const y = (e.clientY || e.touches?.[0]?.clientY || rect.top  + rect.height/2) - rect.top  - size/2;
            const ripple = document.createElement('span');
            ripple.className = 'ripple';
            ripple.style.cssText = `width:${size}px;height:${size}px;left:${x}px;top:${y}px;background:${color};`;
            el.appendChild(ripple);
            ripple.addEventListener('animationend', () => ripple.remove());
        }

        /* ══════════════════════════════════════
           SPARK BURST
        ══════════════════════════════════════ */
        function spawnSparks(e, el) {
            const rect = el.getBoundingClientRect();
            const cx = (e.clientX || rect.left + rect.width/2)  - rect.left;
            const cy = (e.clientY || rect.top  + rect.height/2) - rect.top;
            const colors = ['#34d399','#6ee7b7','#10b981','#fbbf24','#a7f3d0'];
            for (let i = 0; i < 10; i++) {
                const spark = document.createElement('div');
                spark.className = 'spark';
                const angle = (Math.PI * 2 * i / 10) + Math.random() * 0.4;
                const dist  = 28 + Math.random() * 30;
                spark.style.cssText = `
                    left:${cx}px; top:${cy}px;
                    background:${colors[i % colors.length]};
                    --tx:${Math.cos(angle)*dist}px;
                    --ty:${Math.sin(angle)*dist}px;
                `;
                el.appendChild(spark);
                spark.addEventListener('animationend', () => spark.remove());
            }
        }

        /* Attach ripple to all regular buttons */
        document.querySelectorAll('.tab-btn, .social-btn.apple, .forgot-link').forEach(el => {
            el.addEventListener('click', (e) => addRipple(e, el, 'rgba(255,255,255,0.15)'));
        });
        /* Google inner needs ripple too */
        document.querySelector('.g-inner').addEventListener('click', (e) => {
            addRipple(e, e.currentTarget, 'rgba(66,133,244,0.15)');
        });

        /* Ripple + sparks on primary buttons */
        document.querySelectorAll('.primary-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                addRipple(e, btn, 'rgba(255,255,255,0.2)');
                spawnSparks(e, btn);
            });
        });

        /* ══════════════════════════════════════
           TAB SWITCHING (with slide)
        ══════════════════════════════════════ */
        let activeTab = 'signin';

        function updateFormsHeight(sectionId) {
            const section = document.getElementById(sectionId);
            const wrapper = document.getElementById('forms-wrapper');
            // Temporarily make it position relative to read scrollHeight
            section.style.position = 'relative';
            wrapper.style.height = section.scrollHeight + 'px';
            section.style.position = '';
        }

        // Initialize height on load
        window.addEventListener('DOMContentLoaded', () => {
            updateFormsHeight('signin-section');
        });
        // Fallback if DOMContentLoaded already fired
        if (document.readyState !== 'loading') updateFormsHeight('signin-section');

        window.switchTab = (tab) => {
            if (tab === activeTab) return;
            const prev = activeTab;
            activeTab  = tab;

            const prevEl = document.getElementById(prev + '-section');
            const nextEl = document.getElementById(tab  + '-section');

            // Direction: signup → comes from right; signin → comes from left
            const fromRight = tab === 'signup';

            // Slide out current, slide in next
            prevEl.classList.remove('state-center');
            prevEl.classList.add(fromRight ? 'state-left' : 'state-right');

            nextEl.classList.remove(fromRight ? 'state-right' : 'state-left');
            nextEl.classList.add('state-center');

            updateFormsHeight(tab + '-section');

            // Update tab indicator + buttons
            const indicator = document.getElementById('tab-indicator');
            document.getElementById('tab-signin').classList.toggle('active', tab === 'signin');
            document.getElementById('tab-signup').classList.toggle('active', tab === 'signup');
            indicator.style.transform = tab === 'signup' ? 'translateX(100%)' : 'translateX(0)';

            // Update dynamic header
            const header = document.getElementById('dynamic-header');
            header.innerHTML = tab === 'signin'
                ? `<h2 class="welcome-text header-anim">Welcome Back!</h2><p class="sub-text header-anim">Sign in to continue your smart farming journey</p>`
                : `<h2 class="welcome-text header-anim">Create Account</h2><p class="sub-text header-anim">Start your smart farming journey today</p>`;
        };

        /* ══════════════════════════════════════
           PASSWORD STRENGTH
        ══════════════════════════════════════ */
        const strengthColors = ['#ef4444','#f97316','#eab308','#22c55e'];
        const strengthLabels = ['Too weak','Fair','Good','Strong 💪'];

        window.checkStrength = (pwd) => {
            const wrap = document.getElementById('strength-wrap');
            if (!pwd) { wrap.style.display = 'none'; return; }
            wrap.style.display = 'block';
            let score = 0;
            if (pwd.length >= 8) score++;
            if (/[A-Z]/.test(pwd)) score++;
            if (/[0-9]/.test(pwd)) score++;
            if (/[^A-Za-z0-9]/.test(pwd)) score++;
            const idx = Math.max(0, score - 1);
            const color = strengthColors[idx];
            for (let i = 0; i < 4; i++) {
                document.getElementById('sb' + i).style.background = i < score ? color : 'rgba(255,255,255,0.08)';
            }
            const lbl = document.getElementById('strength-label');
            lbl.textContent = strengthLabels[idx];
            lbl.style.color = color;
            // Update wrapper height since strength meter is now visible
            updateFormsHeight('signup-section');
        };

        /* ══════════════════════════════════════
           PASSWORD TOGGLE
        ══════════════════════════════════════ */
        window.togglePwd = (id, icon) => {
            const el = document.getElementById(id);
            el.type = el.type === 'password' ? 'text' : 'password';
            icon.classList.toggle('ri-eye-off-line', el.type === 'password');
            icon.classList.toggle('ri-eye-line',     el.type === 'text');
        };

        /* ══════════════════════════════════════
           AUTH ACTIONS
        ══════════════════════════════════════ */
        function shakeForm(sectionId) {
            const el = document.getElementById(sectionId);
            el.classList.remove('shake');
            void el.offsetWidth; // force reflow
            el.classList.add('shake');
            el.addEventListener('animationend', () => el.classList.remove('shake'), { once: true });
        }

        window.submitSignIn = () => {
            const email = document.getElementById('si-email').value;
            const pwd   = document.getElementById('si-password').value;
            const btn   = document.getElementById('si-btn');
            btn.innerHTML = `<i class="ri-loader-4-line spin" style="margin:auto;font-size:22px;"></i>`;
            loginWithEmailPwd(email, pwd).catch((err) => {
                btn.innerHTML = `Sign In <div class="btn-arrow"><i class="ri-arrow-right-line"></i></div>`;
                shakeForm('signin-section');
                toast(err?.message?.replace('Firebase: ','').replace(/ \(auth\/.+\)/,'') || 'Sign in failed. Check your credentials.', 'error');
            });
        };

        window.submitSignUp = () => {
            const name  = document.getElementById('su-name').value;
            const email = document.getElementById('su-email').value;
            const pwd   = document.getElementById('su-password').value;
            const btn   = document.getElementById('su-btn');
            btn.innerHTML = `<i class="ri-loader-4-line spin" style="margin:auto;font-size:22px;"></i>`;
            signUpWithEmail(email, pwd, name).catch((err) => {
                btn.innerHTML = `Create Account <div class="btn-arrow"><i class="ri-arrow-right-line"></i></div>`;
                shakeForm('signup-section');
                toast(err?.message?.replace('Firebase: ','').replace(/ \(auth\/.+\)/,'') || 'Sign up failed. Try again.', 'error');
            });
        };

        window.handleGoogleLogin = () => { loginWithGoogle(); };

        window.handleForgotPassword = async (e) => {
            e.preventDefault();
            const email = (document.getElementById('si-email')?.value || '').trim();
            if (!email) {
                toast('Enter your email address first, then tap Forgot Password.', 'info');
                return;
            }
            try {
                await sendPasswordResetEmail(auth, email);
                toast('Reset link sent to ' + email + ' — check your inbox & spam.', 'success');
            } catch (err) {
                toast(err?.message?.replace('Firebase: ','').replace(/ \(auth\/.+\)/,'') || 'Could not send reset email.', 'error');
            }
        };

    </script>
</body>
</html>
