<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script>
    (function () {
      var h = location.hostname || "";
      if (!h.endsWith("github.io")) return;
      var path = location.pathname;
      var parts = path.split("/").filter(Boolean);
      var repo = parts[0];
      if (!repo || repo.indexOf(".") !== -1) return;
      if (path === "/" + repo) {
        location.replace("/" + repo + "/" + location.search + location.hash);
        return;
      }
      var b = document.createElement("base");
      b.href = "/" + repo + "/";
      var head = document.head || document.getElementsByTagName("head")[0];
      if (head) head.insertBefore(b, head.firstChild);
    })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smart Farming — Sign in</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        :root {
            --primary: #10b981;
            --primary-glow: rgba(16, 185, 129, 0.55);
            --primary-dim: #059669;
            --mint-bright: #5eead4;
            --card: rgba(20, 25, 30, 0.92);
            --card-border: rgba(255, 255, 255, 0.08);
            --field-bg: rgba(12, 16, 22, 0.85);
            --text: #ffffff;
            --muted: #9ca3af;
            --google-spin-dur: 5.2s;
            --g-red: #ea4335;
            --g-yellow: #fbbc05;
            --g-green: #34a853;
            --g-blue: #4285f4;
            --tilt-x: 0deg;
            --tilt-y: 0deg;
            --parallax-x: 0px;
            --parallax-y: 0px;
            --card-tx: 0deg;
            --card-ty: 0deg;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 28px 18px 40px;
            position: relative;
            overflow-x: hidden;
        }

        .page-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            background:
                linear-gradient(160deg, rgba(15, 23, 42, 0.52) 0%, rgba(6, 78, 59, 0.38) 100%),
                url('https://images.unsplash.com/photo-1523348837708-ccddcda28030?auto=format&fit=crop&w=1920&q=85') center/cover no-repeat;
            filter: blur(14px);
            transform: scale(1.07);
            animation: aliveBgPulse 22s ease-in-out infinite alternate;
        }

        @keyframes aliveBgPulse {
            0% { opacity: 0.92; transform: scale(1.06); }
            100% { opacity: 1; transform: scale(1.092); }
        }

        .page-bg-fallback {
            position: fixed;
            inset: 0;
            z-index: -1;
            background: linear-gradient(145deg, #0f172a 0%, #064e3b 50%, #022c22 100%);
        }

        /* Living atmosphere — aurora washes + film texture */
        .page-aurora {
            pointer-events: none;
            position: fixed;
            inset: -25%;
            z-index: 0;
            opacity: 0.75;
            mix-blend-mode: screen;
            background:
                radial-gradient(ellipse 42% 38% at 18% 32%, rgba(16, 185, 129, 0.28) 0%, transparent 58%),
                radial-gradient(ellipse 38% 36% at 82% 64%, rgba(45, 212, 191, 0.18) 0%, transparent 52%),
                radial-gradient(ellipse 32% 40% at 48% 12%, rgba(52, 211, 153, 0.2) 0%, transparent 48%),
                radial-gradient(ellipse 28% 30% at 72% 22%, rgba(167, 243, 208, 0.12) 0%, transparent 50%);
            animation: auroraDrift 32s ease-in-out infinite alternate;
        }

        @keyframes auroraDrift {
            0% { transform: translate(-2%, -1%) rotate(-2deg) scale(1); }
            100% { transform: translate(3%, 2%) rotate(3deg) scale(1.06); }
        }

        .page-motes {
            pointer-events: none;
            position: fixed;
            inset: 0;
            z-index: 0;
            overflow: hidden;
        }

        .page-motes::before,
        .page-motes::after {
            content: '';
            position: absolute;
            width: 220%;
            height: 220%;
            left: -60%;
            top: -60%;
            background-image:
                radial-gradient(1.5px 1.5px at 10% 20%, rgba(209, 250, 229, 0.45) 50%, transparent 52%),
                radial-gradient(1px 1px at 70% 80%, rgba(167, 243, 208, 0.35) 50%, transparent 52%),
                radial-gradient(1.2px 1.2px at 40% 60%, rgba(255, 255, 255, 0.2) 50%, transparent 52%),
                radial-gradient(1px 1px at 88% 30%, rgba(52, 211, 153, 0.3) 50%, transparent 52%),
                radial-gradient(1.3px 1.3px at 25% 90%, rgba(204, 251, 241, 0.25) 50%, transparent 52%);
            background-size: 100% 100%;
            animation: motesFloat 52s linear infinite;
            opacity: 0.65;
        }

        .page-motes::after {
            animation-duration: 78s;
            animation-direction: reverse;
            opacity: 0.4;
            transform: rotate(180deg);
        }

        @keyframes motesFloat {
            from { transform: translateY(0) translateX(0); }
            to { transform: translateY(-16%) translateX(-4%); }
        }

        .page-alive-vignette {
            pointer-events: none;
            position: fixed;
            inset: 0;
            z-index: 1;
            background: radial-gradient(ellipse 70% 55% at 50% 45%, transparent 35%, rgba(2, 6, 23, 0.55) 100%);
            mix-blend-mode: multiply;
            opacity: 0.85;
            animation: vignettePulse 18s ease-in-out infinite alternate;
        }

        @keyframes vignettePulse {
            from { opacity: 0.75; transform: scale(1); }
            to { opacity: 0.92; transform: scale(1.02); }
        }

        .page-filmgrain {
            pointer-events: none;
            position: fixed;
            inset: 0;
            z-index: 2;
            opacity: 0.045;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            animation: grainShift 9s steps(6) infinite;
            mix-blend-mode: overlay;
        }

        @keyframes grainShift {
            0%, 100% { transform: translate(0, 0); }
            25% { transform: translate(-1.2%, 0.6%); }
            50% { transform: translate(0.8%, -0.4%); }
            75% { transform: translate(-0.4%, -0.8%); }
        }

        .wrap {
            width: 100%;
            max-width: 420px;
            position: relative;
            z-index: 3;
            transition: transform 0.75s cubic-bezier(0.22, 1, 0.36, 1);
            transform: translate(var(--parallax-x), var(--parallax-y));
        }

        /* —— Alive brand orb + leaf sculpture —— */
        .brand {
            text-align: center;
            margin-bottom: 28px;
            perspective: 900px;
        }

        .brand-alive {
            position: relative;
            width: min(148px, 38vw);
            height: min(148px, 38vw);
            margin: 0 auto 18px;
            transform-style: preserve-3d;
            transition: transform 0.5s cubic-bezier(0.22, 1, 0.36, 1);
            transform:
                rotateX(var(--tilt-x, 0deg))
                rotateY(var(--tilt-y, 0deg))
                translateZ(0);
        }

        .brand-halo-soft {
            position: absolute;
            inset: -18%;
            border-radius: 50%;
            background: radial-gradient(circle at 40% 35%, rgba(110, 231, 183, 0.35) 0%, transparent 58%);
            animation: haloBreathe 5.5s ease-in-out infinite alternate;
            filter: blur(12px);
        }

        .brand-ring-outer {
            position: absolute;
            inset: -4px;
            border-radius: 50%;
            padding: 1px;
            background: conic-gradient(from 210deg,
                rgba(167,243,208,0.15),
                rgba(16,185,129,0.55),
                rgba(45,212,191,0.35),
                rgba(209,250,229,0.2),
                rgba(16,185,129,0.5),
                rgba(167,243,208,0.15));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask-composite: exclude;
            animation: ringWhirl 16s linear infinite;
            transform-origin: center center;
            opacity: 0.9;
            box-shadow: 0 0 40px rgba(16, 185, 129, 0.15), inset 0 0 20px rgba(16, 185, 129, 0.08);
        }

        .brand-ring-inner {
            position: absolute;
            inset: 6px;
            border-radius: 50%;
            padding: 1px;
            background: conic-gradient(from 120deg,
                transparent 40%,
                rgba(52, 211, 153, 0.45),
                transparent 70%);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask-composite: exclude;
            animation: ringWhirl 11s linear infinite reverse;
            transform-origin: center center;
            opacity: 0.85;
        }

        @keyframes ringWhirl {
            to { transform: rotate(360deg); }
        }

        @keyframes haloBreathe {
            from { transform: scale(0.94); opacity: 0.7; filter: blur(14px); }
            to { transform: scale(1.08); opacity: 1; filter: blur(18px); }
        }

        .brand-glare-sweep {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            overflow: hidden;
            pointer-events: none;
        }

        .brand-glare-sweep::after {
            content: '';
            position: absolute;
            width: 36%;
            height: 140%;
            left: -20%;
            top: -20%;
            background: linear-gradient(116deg,
                transparent 42%,
                rgba(255,255,255,0.06) 48%,
                rgba(236,253,245,0.35) 50%,
                rgba(255,255,255,0.06) 52%,
                transparent 56%);
            animation: glarePass 14s cubic-bezier(0.4, 0, 0.2, 1) infinite;
            opacity: 0.85;
        }

        @keyframes glarePass {
            0%, 12% { transform: translate(-30%, -10%) rotate(-12deg); opacity: 0; }
            24% { opacity: 0.95; }
            48%, 100% { transform: translate(220%, 20%) rotate(-12deg); opacity: 0; }
        }

        .brand-leaf-shell {
            position: absolute;
            inset: 12px;
            border-radius: 50%;
            display: grid;
            place-items: center;
            background:
                radial-gradient(circle at 35% 32%, rgba(52,211,153,0.18) 0%, transparent 45%),
                radial-gradient(circle at 70% 70%, rgba(6,95,70,0.35) 0%, rgba(15,23,42,0.92) 70%);
            box-shadow:
                inset 0 2px 12px rgba(167,243,208,0.12),
                inset 0 -6px 20px rgba(0,0,0,0.45),
                0 0 0 1px rgba(16, 185, 129, 0.22),
                0 12px 36px rgba(0, 0, 0, 0.38);
            overflow: visible;
            z-index: 2;
        }

        .brand-leaf-bio {
            position: absolute;
            inset: auto;
            width: 68%;
            height: 68%;
            border-radius: 50%;
            background: radial-gradient(circle at 50% 50%, rgba(16,185,129,0.42) 0%, transparent 65%);
            filter: blur(20px);
            animation: bioPulse 3.8s ease-in-out infinite alternate;
            z-index: 0;
        }

        @keyframes bioPulse {
            from { transform: scale(0.88); opacity: 0.45; }
            to { transform: scale(1.12); opacity: 0.85; }
        }

        .brand-leaf-sway {
            position: relative;
            z-index: 2;
            width: 56%;
            height: 56%;
            display: grid;
            place-items: center;
            transform-origin: 50% 85%;
            animation: leafSway 6.5s ease-in-out infinite alternate;
        }

        @keyframes leafSway {
            0% { transform: rotate(-5deg) translateY(1px); }
            100% { transform: rotate(5deg) translateY(-2px); }
        }

        .brand-leaf-sway::before {
            content: '';
            position: absolute;
            inset: -18%;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(110,231,183,0.22) 0%, transparent 68%);
            animation: leafAura 4.2s ease-in-out infinite alternate;
        }

        @keyframes leafAura {
            from { transform: scale(0.9); opacity: 0.5; }
            to { transform: scale(1.15); opacity: 0.95; }
        }

        .brand-leaf-icon {
            font-size: clamp(2.35rem, 8.2vw, 3rem);
            line-height: 1;
            display: block;
            background: linear-gradient(158deg,
                #ccfbf1 0%,
                #5eead4 14%,
                #34d399 42%,
                var(--primary) 62%,
                #047857 100%);
            background-size: 220% 220%;
            animation: leafLive 5.2s ease-in-out infinite alternate, leafHueDrift 16s ease-in-out infinite alternate;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            -webkit-text-fill-color: transparent;
            filter:
                drop-shadow(0 2px 5px rgba(6,95,59,0.62))
                drop-shadow(0 0 26px rgba(52,211,153,0.48));
            transform-origin: 50% 88%;
        }

        @keyframes leafHueDrift {
            0% { background-position: 0% 20%; }
            100% { background-position: 100% 80%; }
        }

        @keyframes leafLive {
            0% {
                transform: scale(0.97) rotate(-1.75deg);
                filter:
                    brightness(1) saturate(1)
                    drop-shadow(0 2px 5px rgba(6,95,59,0.55))
                    drop-shadow(0 0 18px rgba(52,211,153,0.42));
            }
            100% {
                transform: scale(1.045) rotate(1.65deg);
                filter:
                    brightness(1.08) saturate(1.1)
                    drop-shadow(0 3px 9px rgba(6,95,59,0.68))
                    drop-shadow(0 0 34px rgba(110,231,183,0.58));
            }
        }

        .brand-spores {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 4;
            animation: sporeField 20s linear infinite;
        }

        @keyframes sporeField {
            to { transform: rotate(360deg); }
        }

        .brand-spores span {
            position: absolute;
            width: 3px;
            height: 3px;
            border-radius: 50%;
            left: 50%;
            top: 50%;
            margin: -1.5px 0 0 -1.5px;
            background: radial-gradient(circle at 30% 30%, #f0fdf4 0%, rgba(52,211,153,0.95) 42%, transparent 72%);
            box-shadow: 0 0 10px rgba(167,243,208,0.95);
            animation: sporeTwinkle 2.9s ease-in-out infinite alternate;
        }

        .brand-spores span:nth-child(1) { transform: rotate(0deg) translateY(calc(-1 * min(62px, 15.5vw))); animation-delay: 0s; }
        .brand-spores span:nth-child(2) { transform: rotate(60deg) translateY(calc(-1 * min(62px, 15.5vw))); animation-delay: 0.4s; }
        .brand-spores span:nth-child(3) { transform: rotate(120deg) translateY(calc(-1 * min(62px, 15.5vw))); animation-delay: 0.75s; }
        .brand-spores span:nth-child(4) { transform: rotate(180deg) translateY(calc(-1 * min(62px, 15.5vw))); animation-delay: 1.1s; }
        .brand-spores span:nth-child(5) { transform: rotate(240deg) translateY(calc(-1 * min(62px, 15.5vw))); animation-delay: 1.45s; }
        .brand-spores span:nth-child(6) { transform: rotate(300deg) translateY(calc(-1 * min(62px, 15.5vw))); animation-delay: 1.85s; }

        @keyframes sporeTwinkle {
            from {
                opacity: 0.3;
                box-shadow: 0 0 4px rgba(167,243,208,0.45);
                filter: brightness(0.95);
            }
            to {
                opacity: 1;
                box-shadow: 0 0 14px rgba(236,253,245,0.9);
                filter: brightness(1.25);
            }
        }


        .brand h1 {
            font-family: 'Syne', 'Inter', system-ui, sans-serif;
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: -0.03em;
            line-height: 1.08;
            text-wrap: balance;
        }

        .brand h1 .brand-smart {
            color: #fff;
            text-shadow:
                0 0 40px rgba(255,255,255,0.08),
                0 24px 48px rgba(0,0,0,0.35);
            animation: smartGlass 14s ease-in-out infinite alternate;
        }

        @keyframes smartGlass {
            from { text-shadow: 0 0 32px rgba(255,255,255,0.05), 0 20px 40px rgba(0,0,0,0.3); }
            to { text-shadow: 0 0 52px rgba(255,255,255,0.12), 0 28px 56px rgba(0,0,0,0.42); }
        }

        .brand h1 .brand-farming {
            background: linear-gradient(125deg, #34d399 12%, var(--primary) 38%, #5eead4 62%, #a7f3d0 88%);
            background-size: 240% auto;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: farmingShimmer 14s linear infinite alternate;
            filter: drop-shadow(0 0 28px rgba(52,211,153,0.35));
        }

        @keyframes farmingShimmer {
            0% { background-position: 0% center; filter: hue-rotate(0deg); }
            100% { background-position: 100% center; filter: hue-rotate(-6deg); }
        }

        .brand .tagline {
            font-family: 'Inter', system-ui, sans-serif;
            font-size: 0.68rem;
            font-weight: 600;
            letter-spacing: 0.32em;
            color: rgba(255, 255, 255, 0.72);
            margin-top: 10px;
            text-transform: uppercase;
            opacity: 0.92;
            animation: taglineDrift 20s ease-in-out infinite alternate;
        }

        @keyframes taglineDrift {
            from { letter-spacing: 0.29em; opacity: 0.82; }
            to { letter-spacing: 0.36em; opacity: 0.98; }
        }

        .card {
            position: relative;
            background: rgba(22, 28, 38, 0.94);
            border: 1px solid rgba(255, 255, 255, 0.081);
            border-radius: 28px;
            padding: 28px 24px 26px;
            backdrop-filter: blur(26px);
            -webkit-backdrop-filter: blur(26px);
            isolation: isolate;
            overflow: hidden;
            transform-style: preserve-3d;
            transition:
                transform 0.72s cubic-bezier(0.22, 1, 0.36, 1),
                box-shadow 0.62s cubic-bezier(0.22, 1, 0.36, 1);
            box-shadow:
                0 26px 64px rgba(0, 0, 0, 0.52),
                inset 0 1px 0 rgba(255,255,255,0.065),
                0 0 0 1px rgba(15,118,110,0.12) inset;
            transform:
                perspective(980px)
                rotateX(var(--card-tx, 0deg))
                rotateY(var(--card-ty, 0deg));
            animation: cardAura 11s ease-in-out infinite alternate;
        }

        @keyframes cardAura {
            0% {
                box-shadow:
                    0 26px 64px rgba(0, 0, 0, 0.52),
                    inset 0 1px 0 rgba(255,255,255,0.065),
                    0 0 60px -40px rgba(16,185,129,0.14);
            }
            100% {
                box-shadow:
                    0 28px 72px rgba(0, 0, 0, 0.54),
                    inset 0 1px 0 rgba(255,255,255,0.08),
                    0 0 72px -28px rgba(52,211,153,0.22);
            }
        }

        .card::before {
            content: '';
            position: absolute;
            width: 220%;
            height: 220%;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            z-index: 0;
            background: conic-gradient(
                from 200deg,
                rgba(209,250,229,0.08),
                rgba(16,185,129,0.28),
                rgba(52,211,153,0.12),
                rgba(45,212,191,0.15),
                rgba(167,243,208,0.1),
                rgba(209,250,229,0.08)
            );
            animation: aliveCardRibbon 54s linear infinite;
            opacity: 0.22;
            filter: blur(0.75px);
        }

        @keyframes aliveCardRibbon {
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }

        .card > * {
            position: relative;
            z-index: 2;
        }

        #dynamic-header { margin-bottom: 22px; }
        .welcome-text { font-size: 1.35rem; font-weight: 700; margin-bottom: 6px; letter-spacing: -0.02em; }
        .sub-text { font-size: 0.875rem; color: var(--muted); line-height: 1.45; }

        .tabs {
            display: flex;
            margin-bottom: 22px;
            position: relative;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .tab-btn {
            flex: 1;
            padding: 14px 8px 12px;
            border: none;
            background: none;
            color: var(--muted);
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.12em;
            cursor: pointer;
            font-family: inherit;
            text-transform: uppercase;
        }

        .tab-btn.active { color: #fff; }

        .tab-ind {
            position: absolute;
            bottom: -1px;
            left: 0;
            width: 50%;
            height: 3px;
            background: var(--primary);
            border-radius: 3px 3px 0 0;
            box-shadow: 0 0 14px var(--primary-glow), 0 0 24px rgba(16, 185, 129, 0.35);
            transition: transform 0.28s ease;
        }

        .panel-hidden { display: none !important; }

        .input-block { margin-bottom: 16px; }

        .row {
            display: flex;
            align-items: stretch;
            gap: 12px;
            padding: 4px 4px 4px 6px;
            border-radius: 14px;
            background: var(--field-bg);
            border: 1px solid rgba(255, 255, 255, 0.07);
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .row:focus-within {
            border-color: rgba(16, 185, 129, 0.45);
            box-shadow: 0 0 0 1px rgba(16, 185, 129, 0.12);
        }

        .row .ico {
            width: 48px;
            flex-shrink: 0;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--muted);
            font-size: 22px;
        }

        .row:focus-within .ico { color: var(--primary); }

        .field {
            flex: 1;
            min-width: 0;
            padding: 10px 4px 12px 0;
        }

        .field label {
            display: block;
            font-size: 0.6875rem;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.45);
            margin-bottom: 4px;
            letter-spacing: 0.04em;
        }

        .field input {
            width: 100%;
            padding: 0;
            border: none;
            background: transparent;
            color: var(--text);
            font-size: 0.9375rem;
            outline: none;
            font-family: inherit;
        }

        .field input::placeholder { color: rgba(156, 163, 175, 0.55); }

        .eye {
            width: 48px;
            flex-shrink: 0;
            margin: 6px 6px 6px 0;
            border-radius: 12px;
            border: none;
            background: rgba(255, 255, 255, 0.04);
            color: var(--muted);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .eye:hover { color: #e5e7eb; }

        .forgot-link {
            display: block;
            text-align: right;
            font-size: 0.8125rem;
            font-weight: 500;
            color: var(--primary);
            text-decoration: none;
            margin: -4px 0 20px;
        }

        .forgot-link:hover { text-decoration: underline; }

        .submit-wrap { margin-top: 4px; }

        .primary-btn {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 14px 14px 14px 22px;
            border: none;
            border-radius: 14px;
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: #fff;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            box-shadow: 0 8px 28px rgba(16, 185, 129, 0.35);
        }

        .primary-btn:hover {
            filter: brightness(1.06);
            box-shadow: 0 10px 32px rgba(16, 185, 129, 0.42);
        }

        .primary-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            box-shadow: none;
        }

        .primary-btn-label { flex: 1; text-align: left; }

        .primary-btn-arrow {
            width: 44px;
            height: 44px;
            flex-shrink: 0;
            border-radius: 12px;
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary);
        }

        .primary-btn-arrow svg { display: block; }

        .strength-wrap { margin: 4px 0 12px; }
        .strength-bars { display: flex; gap: 5px; margin-bottom: 5px; }
        .s-bar {
            flex: 1;
            height: 3px;
            border-radius: 2px;
            background: rgba(255,255,255,0.08);
        }
        .strength-label { font-size: 11px; color: var(--muted); }

        .terms-row {
            display: flex;
            gap: 10px;
            align-items: flex-start;
            margin: 8px 0 18px;
            font-size: 0.75rem;
            color: var(--muted);
        }
        .terms-row input { accent-color: var(--primary); margin-top: 3px; flex-shrink: 0; }

        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 24px 0 18px;
            font-size: 0.75rem;
            color: var(--muted);
            font-weight: 500;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255, 255, 255, 0.12);
        }

        .social-google-wrap {
            position: relative;
            width: 100%;
            border-radius: 15px;
            overflow: hidden;
            isolation: isolate;
        }

        .social-google-orbit {
            position: absolute;
            width: 190%;
            height: 210%;
            left: 50%;
            top: 50%;
            z-index: 0;
            background: conic-gradient(
                from 0deg,
                var(--g-blue) 0deg,
                var(--g-red) 90deg,
                var(--g-yellow) 180deg,
                var(--g-green) 270deg,
                var(--g-blue) 360deg
            );
            opacity: 0.98;
            animation: googleOrbRotate var(--google-spin-dur) linear infinite;
        }

        .social-google-inner {
            position: relative;
            z-index: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 14px 16px;
            margin: 2px;
            width: calc(100% - 4px);
            border-radius: 13px;
            border: none;
            cursor: pointer;
            font-family: inherit;
            background: linear-gradient(180deg, #ffffff 0%, #fafbfc 100%);
            box-shadow:
                inset 0 1px 0 rgba(255,255,255,1),
                0 1px 0 rgba(255,255,255,0.06);
            color: #0f172a;
            font-size: 0.875rem;
            font-weight: 600;
            transition: transform 0.18s ease, filter 0.2s ease;
        }

        .social-google-inner:hover {
            filter: brightness(1.03);
            transform: translateY(-0.5px);
        }

        .social-google-inner:active { transform: scale(0.992) translateY(0); }

        .g-logo-badge {
            position: relative;
            width: 32px;
            height: 32px;
            flex-shrink: 0;
            display: grid;
            place-items: center;
        }

        .g-logo-ring {
            position: absolute;
            left: 50%;
            top: 50%;
            width: 130%;
            height: 130%;
            border-radius: 50%;
            background: conic-gradient(
                from 0deg,
                var(--g-blue) 0deg,
                var(--g-red) 90deg,
                var(--g-yellow) 180deg,
                var(--g-green) 270deg,
                var(--g-blue) 360deg
            );
            padding: 2.5px;
            box-sizing: border-box;
            -webkit-mask:
                linear-gradient(#fff 0 0) content-box,
                linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask:
                linear-gradient(#fff 0 0) content-box,
                linear-gradient(#fff 0 0);
            mask-composite: exclude;
            animation: googleOrbRotate var(--google-spin-dur) linear infinite;
        }

        .g-logo-face {
            position: relative;
            z-index: 1;
            width: 26px;
            height: 26px;
            border-radius: 50%;
            background: linear-gradient(160deg, #fff 40%, #f3f6f9 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: inset 0 0 0 1px rgba(255,255,255,0.95);
        }

        .social-google-inner .g-logo {
            display: block;
            width: 19px;
            height: 19px;
            filter: drop-shadow(0 1px 1px rgba(15,23,42,0.06));
        }

        .social-apple-wrap {
            position: relative;
            width: 100%;
            margin-top: 12px;
            border-radius: 15px;
            overflow: hidden;
            isolation: isolate;
            animation: appleFrameGlow 3.8s ease-in-out infinite;
        }

        @keyframes appleFrameGlow {
            0%, 100% {
                box-shadow:
                    0 0 0 1px rgba(185, 28, 28, 0.4),
                    0 12px 40px rgba(67, 7, 12, 0.55),
                    0 0 48px rgba(220, 38, 38, 0.22);
            }
            45% {
                box-shadow:
                    0 0 0 1px rgba(248, 113, 113, 0.55),
                    0 14px 48px rgba(127, 29, 29, 0.6),
                    0 0 64px rgba(239, 68, 68, 0.35);
            }
        }

        .apple-fx-layer {
            pointer-events: none;
            position: absolute;
            inset: 0;
            border-radius: inherit;
            overflow: hidden;
            z-index: 0;
            background:
                radial-gradient(ellipse 80% 65% at 50% -20%, rgba(220,38,38,0.38) 0%, transparent 55%),
                radial-gradient(ellipse 90% 50% at 80% 100%, rgba(127,29,29,0.35) 0%, transparent 50%);
            opacity: 0.92;
        }

        .apple-shimmer {
            position: absolute;
            inset: -40% -20%;
            background: linear-gradient(
                118deg,
                transparent 42%,
                rgba(254,202,202,0.12) 49%,
                rgba(254,226,226,0.18) 50%,
                rgba(254,202,202,0.08) 51%,
                transparent 56%
            );
            animation: appleSweep 11s ease-in-out infinite;
        }

        .apple-dot {
            position: absolute;
            left: var(--ax);
            top: calc(-16% + var(--ay, 0px));
            width: var(--asz, 3px);
            height: var(--asz, 3px);
            border-radius: 50%;
            background: radial-gradient(circle at 35% 30%, rgba(255,237,237,1) 0%, rgba(252,165,165,0.95) 40%, rgba(185,28,28,0.75) 100%);
            box-shadow:
                0 0 6px rgba(248,113,113,0.95),
                0 0 14px rgba(220,38,38,0.45);
            animation: appleFall var(--alen, 3.8s) cubic-bezier(.22, .61, .36, .98) infinite;
            animation-delay: var(--ad, 0s);
            opacity: 0;
        }

        .social-apple-inner {
            position: relative;
            z-index: 2;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 14px 16px;
            margin: 2px;
            width: calc(100% - 4px);
            border-radius: 13px;
            border: none;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.875rem;
            font-weight: 600;
            letter-spacing: 0.015em;
            color: #fef2f2;
            background: linear-gradient(168deg,
                #251014 0%,
                #120608 42%,
                #1f0a0f 76%,
                #2d1118 100%);
            box-shadow:
                inset 0 1px 0 rgba(255,220,220,0.14),
                inset 0 -1px 0 rgba(67,10,14,0.55),
                0 1px 0 rgba(248,113,113,0.08);
            transition: transform 0.18s ease, filter 0.22s ease, box-shadow 0.22s ease;
            text-shadow: 0 1px 2px rgba(0,0,0,0.45);
        }

        .social-apple-inner:hover {
            filter: brightness(1.12) saturate(1.06);
            box-shadow:
                inset 0 1px 0 rgba(255,220,220,0.22),
                inset 0 -1px 0 rgba(67,10,14,0.45),
                0 0 28px rgba(220,38,38,0.35);
            transform: translateY(-1px);
        }

        .social-apple-inner:active {
            transform: scale(0.993) translateY(0);
        }

        .social-apple-inner .apple-ico {
            font-size: 22px;
            color: #fff7f8;
            line-height: 1;
            filter: drop-shadow(0 2px 6px rgba(220,38,38,0.45));
        }

        @keyframes googleOrbRotate {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }

        @keyframes appleSweep {
            0%, 12% { transform: translate(-8%, -6%) rotate(0deg); opacity: 0.7; }
            50% { transform: translate(6%, 10%) rotate(2deg); opacity: 1; }
            100% { transform: translate(18%, -4%) rotate(0deg); opacity: 0.75; }
        }

        @keyframes appleFall {
            0% {
                transform: translateY(-4px) scale(0.6);
                opacity: 0;
            }
            12% {
                opacity: 0.92;
                transform: translateY(6px) scale(1);
            }
            55% {
                opacity: 0.75;
            }
            100% {
                transform: translateY(58px) scale(0.35);
                opacity: 0;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            .page-bg,
            .page-aurora,
            .page-motes::before,
            .page-motes::after,
            .page-alive-vignette,
            .page-filmgrain,
            .brand-halo-soft,
            .brand-ring-outer,
            .brand-ring-inner,
            .brand-glare-sweep::after,
            .brand-leaf-bio,
            .brand-leaf-sway,
            .brand-leaf-sway::before,
            .brand-leaf-icon,
            .brand-spores,
            .brand-spores span,
            .brand h1 .brand-smart,
            .brand h1 .brand-farming,
            .brand .tagline,
            .social-google-orbit,
            .g-logo-ring,
            .apple-dot,
            .apple-shimmer,
            .social-apple-wrap,
            .card,
            .card::before {
                animation: none !important;
            }
            .page-bg {
                opacity: 1;
                transform: scale(1.07);
            }
            .social-apple-wrap {
                box-shadow: 0 0 0 1px rgba(185,28,28,0.35), 0 8px 28px rgba(40,10,14,0.5);
            }
            .brand-spores span { opacity: 0.72; filter: none !important; }
            .brand h1 .brand-farming {
                background-position: 50% center;
                filter: none !important;
            }
        }

        .security-badge {
            margin-top: 22px;
            padding: 14px 16px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 0.75rem;
            color: var(--muted);
            line-height: 1.45;
            background: rgba(15, 23, 42, 0.35);
        }
        .security-badge strong {
            display: block;
            color: rgba(255, 255, 255, 0.9);
            font-weight: 600;
            margin-bottom: 4px;
        }

        .login-toast {
            position: fixed;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: #1e293b;
            color: white;
            padding: 13px 22px;
            border-radius: 14px;
            font-size: 0.8125rem;
            font-weight: 500;
            z-index: 9999;
            max-width: 88vw;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
            opacity: 0;
            pointer-events: none;
            transition: transform 0.35s ease, opacity 0.35s ease;
        }
        .login-toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }
        .login-toast.success { border-color: rgba(52,211,153,0.45); color: #6ee7b7; }
        .login-toast.error { border-color: rgba(239,68,68,0.45); color: #fca5a5; }
        .login-toast.info { border-color: rgba(96,165,250,0.45); color: #93c5fd; }

        @keyframes rotateSpin { to { transform: rotate(360deg); } }
        .spin { display: inline-block; animation: rotateSpin 0.7s linear infinite; }

        @keyframes shake {
            0%,100% { transform: translateX(0); }
            25% { transform: translateX(-6px); }
            75% { transform: translateX(6px); }
        }
        .shake { animation: shake 0.4s ease; }
    </style>
</head>
<body>
    <div class="page-bg-fallback" aria-hidden="true"></div>
    <div class="page-bg" aria-hidden="true"></div>
    <div class="page-aurora" aria-hidden="true"></div>
    <div class="page-motes" aria-hidden="true"></div>
    <div class="page-alive-vignette" aria-hidden="true"></div>
    <div class="page-filmgrain" aria-hidden="true"></div>

    <div class="login-toast" id="login-toast"></div>

    <div class="wrap">
        <div class="brand">
            <div class="brand-alive" id="brand-alive" role="img" aria-label="Smart Farming living emblem">
                <div class="brand-halo-soft" aria-hidden="true"></div>
                <div class="brand-ring-outer" aria-hidden="true"></div>
                <div class="brand-ring-inner" aria-hidden="true"></div>
                <div class="brand-glare-sweep" aria-hidden="true"></div>
                <div class="brand-leaf-shell">
                    <div class="brand-leaf-bio" aria-hidden="true"></div>
                    <div class="brand-leaf-sway">
                        <i class="ri-leaf-fill brand-leaf-icon" aria-hidden="true"></i>
                    </div>
                </div>
                <div class="brand-spores" aria-hidden="true">
                    <span></span><span></span><span></span><span></span><span></span><span></span>
                </div>
            </div>
            <h1><span class="brand-smart" data-i18n="auth.title_smart">Smart</span> <span class="brand-farming" data-i18n="auth.title_farming">Farming</span></h1>
            <p class="tagline" data-i18n="auth.subtitle_caps">AI Powered Agriculture</p>
        </div>

        <div class="card" id="login-card">
            <div id="dynamic-header">
                <h2 class="welcome-text" data-i18n="auth.welcome_back">Welcome Back!</h2>
                <p class="sub-text" data-i18n="auth.signin_desc">Sign in to continue your smart farming journey</p>
            </div>

            <div class="tabs">
                <button type="button" class="tab-btn active" id="tab-signin" data-tab="signin" data-i18n="auth.signin_tab">Sign In</button>
                <button type="button" class="tab-btn" id="tab-signup" data-tab="signup" data-i18n="auth.signup_tab">Sign Up</button>
                <div class="tab-ind" id="tab-indicator"></div>
            </div>

            <!-- Sign in -->
            <div id="signin-section">
                <form id="form-signin">
                    <div class="input-block">
                        <div class="row">
                            <div class="ico"><i class="ri-user-3-line"></i></div>
                            <div class="field">
                                <label for="si-email" data-i18n="auth.email">Email Address</label>
                                <input type="email" id="si-email" name="email" autocomplete="email" placeholder="Enter your email address" data-i18n-placeholder="auth.placeholder_email" required>
                            </div>
                        </div>
                    </div>
                    <div class="input-block">
                        <div class="row">
                            <div class="ico"><i class="ri-lock-2-line"></i></div>
                            <div class="field">
                                <label for="si-password" data-i18n="auth.password">Password</label>
                                <input type="password" id="si-password" name="password" autocomplete="current-password" placeholder="Enter your password" data-i18n-placeholder="auth.placeholder_password" required>
                            </div>
                            <button type="button" class="eye" id="si-eye" aria-label="Show password"><i class="ri-eye-off-line"></i></button>
                        </div>
                    </div>
                    <a href="#" class="forgot-link" id="forgot-link" data-i18n="auth.forgot_password">Forgot Password?</a>
                    <div class="submit-wrap">
                        <button type="submit" class="primary-btn" id="si-btn">
                            <span class="primary-btn-label" id="si-btn-label" data-i18n="auth.signin_btn">Sign In</span>
                            <span class="primary-btn-arrow" aria-hidden="true">
                                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                                    <path d="M5 12h14M13 6l6 6-6 6" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
                                </svg>
                            </span>
                        </button>
                    </div>
                </form>
            </div>

            <!-- Sign up -->
            <div id="signup-section" class="panel-hidden">
                <form id="form-signup">
                    <div class="input-block">
                        <div class="row">
                            <div class="ico"><i class="ri-user-line"></i></div>
                            <div class="field">
                                <label for="su-name" data-i18n="auth.full_name">Full Name</label>
                                <input type="text" id="su-name" name="name" autocomplete="name" placeholder="Enter your full name" data-i18n-placeholder="auth.placeholder_name" required>
                            </div>
                        </div>
                    </div>
                    <div class="input-block">
                        <div class="row">
                            <div class="ico"><i class="ri-user-3-line"></i></div>
                            <div class="field">
                                <label for="su-email" data-i18n="auth.email">Email Address</label>
                                <input type="email" id="su-email" name="email" autocomplete="email" placeholder="Enter your email address" data-i18n-placeholder="auth.placeholder_email" required>
                            </div>
                        </div>
                    </div>
                    <div class="input-block">
                        <div class="row">
                            <div class="ico"><i class="ri-lock-2-line"></i></div>
                            <div class="field">
                                <label for="su-password" data-i18n="auth.password">Password</label>
                                <input type="password" id="su-password" name="password" autocomplete="new-password" placeholder="Create a password" data-i18n-placeholder="auth.placeholder_password_create" required>
                            </div>
                            <button type="button" class="eye" id="su-eye" aria-label="Show password"><i class="ri-eye-off-line"></i></button>
                        </div>
                    </div>
                    <div class="strength-wrap" id="strength-wrap" style="display:none;">
                        <div class="strength-bars">
                            <div class="s-bar" id="sb0"></div>
                            <div class="s-bar" id="sb1"></div>
                            <div class="s-bar" id="sb2"></div>
                            <div class="s-bar" id="sb3"></div>
                        </div>
                        <div class="strength-label" id="strength-label"></div>
                    </div>
                    <div class="terms-row">
                        <input type="checkbox" required id="su-terms">
                        <label for="su-terms" id="su-terms-label">I agree to the Terms of Service and Privacy Policy</label>
                    </div>
                    <div class="submit-wrap">
                        <button type="submit" class="primary-btn" id="su-btn">
                            <span class="primary-btn-label" id="su-btn-label" data-i18n="auth.signup_btn">Create Account</span>
                            <span class="primary-btn-arrow" aria-hidden="true">
                                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                                    <path d="M5 12h14M13 6l6 6-6 6" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
                                </svg>
                            </span>
                        </button>
                    </div>
                </form>
            </div>

            <div class="divider"><span data-i18n="auth.or_continue">or continue with</span></div>

            <div class="social-google-wrap">
                <div class="social-google-orbit" aria-hidden="true"></div>
                <button type="button" class="social-google-inner" id="btn-google" aria-label="Continue with Google">
                    <span class="g-logo-badge">
                        <span class="g-logo-ring" aria-hidden="true"></span>
                        <span class="g-logo-face">
                            <svg class="g-logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="22" height="22" aria-hidden="true">
                              <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
                              <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
                              <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
                              <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
                            </svg>
                        </span>
                    </span>
                    <span data-i18n="auth.google_btn">Continue with Google</span>
                </button>
            </div>

            <div class="social-apple-wrap">
                <div class="apple-fx-layer" aria-hidden="true">
                    <div class="apple-shimmer"></div>
                    <span class="apple-dot" style="--ax: 9%; --ad: 0s; --alen: 4.1s; --asz: 3px;"></span>
                    <span class="apple-dot" style="--ax: 22%; --ad: -0.7s; --alen: 3.6s; --asz: 4px; --ay: 4px;"></span>
                    <span class="apple-dot" style="--ax: 38%; --ad: -1.4s; --alen: 4.4s; --asz: 2.5px;"></span>
                    <span class="apple-dot" style="--ax: 52%; --ad: -2.1s; --alen: 3.9s; --asz: 3.5px; --ay: -2px;"></span>
                    <span class="apple-dot" style="--ax: 66%; --ad: -0.9s; --alen: 4.6s; --asz: 2px;"></span>
                    <span class="apple-dot" style="--ax: 78%; --ad: -2.8s; --alen: 3.4s; --asz: 4px; --ay: 6px;"></span>
                    <span class="apple-dot" style="--ax: 88%; --ad: -1.6s; --alen: 4.2s; --asz: 3px;"></span>
                    <span class="apple-dot" style="--ax: 15%; --ad: -3.2s; --alen: 4.8s; --asz: 2px; --ay: 8px;"></span>
                    <span class="apple-dot" style="--ax: 44%; --ad: -2.4s; --alen: 3.2s; --asz: 3px;"></span>
                    <span class="apple-dot" style="--ax: 59%; --ad: -4s; --alen: 4.5s; --asz: 2.5px; --ay: 3px;"></span>
                </div>
                <button type="button" class="social-apple-inner" id="btn-apple" aria-label="Continue with Apple">
                    <i class="ri-apple-fill apple-ico" aria-hidden="true"></i>
                    <span data-i18n="auth.apple_btn">Continue with Apple</span>
                </button>
            </div>
        </div>

        <div class="security-badge">
            <strong data-i18n="auth.secure_title">Your data is protected</strong>
            <span data-i18n="auth.secure_desc">Sign-in uses industry-standard security. Always use a strong, unique password.</span>
        </div>
    </div>

    <script type="module">
        import { auth, loginWithEmailPwd, signUpWithEmail, loginWithGoogle, loginWithApple } from './js/auth.js';
        import { initI18n, startI18nObserver, t } from './js/i18n.js';
        import { sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        (function setupAliveParallax() {
            const root = document.documentElement;
            const mq = window.matchMedia('(prefers-reduced-motion: reduce)');
            let raf = 0;
            function clearMotionVars() {
                root.style.removeProperty('--parallax-x');
                root.style.removeProperty('--parallax-y');
                root.style.removeProperty('--tilt-x');
                root.style.removeProperty('--tilt-y');
                root.style.removeProperty('--card-tx');
                root.style.removeProperty('--card-ty');
            }
            function onMove(e) {
                if (mq.matches) return;
                cancelAnimationFrame(raf);
                raf = requestAnimationFrame(function () {
                    var w = window.innerWidth || 1;
                    var h = window.innerHeight || 1;
                    var nx = (e.clientX / w - 0.5) * 2;
                    var ny = (e.clientY / h - 0.5) * 2;
                    root.style.setProperty('--parallax-x', (nx * 10).toFixed(2) + 'px');
                    root.style.setProperty('--parallax-y', (ny * 7).toFixed(2) + 'px');
                    root.style.setProperty('--tilt-y', (nx * 14).toFixed(2) + 'deg');
                    root.style.setProperty('--tilt-x', ((-ny) * 11).toFixed(2) + 'deg');
                    root.style.setProperty('--card-ty', (nx * 4.8).toFixed(2) + 'deg');
                    root.style.setProperty('--card-tx', ((-ny) * 3.4).toFixed(2) + 'deg');
                });
            }
            window.addEventListener('mousemove', onMove, { passive: true });
            mq.addEventListener('change', function () {
                if (mq.matches) clearMotionVars();
            });
            if (mq.matches) clearMotionVars();
        })();

        function primaryBtnLoading() {
            return '<span class="primary-btn-label" style="flex:1;text-align:center"><i class="ri-loader-4-line spin"></i></span>';
        }

        function signInButtonRestored() {
            return '<span class="primary-btn-label" id="si-btn-label" data-i18n="auth.signin_btn">' + t('auth.signin_btn') + '</span>'
                + '<span class="primary-btn-arrow" aria-hidden="true"><svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M5 12h14M13 6l6 6-6 6" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg></span>';
        }

        function signUpButtonRestored() {
            return '<span class="primary-btn-label" id="su-btn-label" data-i18n="auth.signup_btn">' + t('auth.signup_btn') + '</span>'
                + '<span class="primary-btn-arrow" aria-hidden="true"><svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M5 12h14M13 6l6 6-6 6" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg></span>';
        }

        await initI18n();
        startI18nObserver();

        function toast(msg, type = 'info', duration = 4000) {
            const el = document.getElementById('login-toast');
            el.textContent = msg;
            el.className = 'login-toast show ' + type;
            clearTimeout(el._timer);
            el._timer = setTimeout(() => el.classList.remove('show'), duration);
        }

        function restoreSignInButton() {
            const btn = document.getElementById('si-btn');
            btn.disabled = false;
            btn.innerHTML = signInButtonRestored();
        }

        function restoreSignUpButton() {
            const btn = document.getElementById('su-btn');
            btn.disabled = false;
            btn.innerHTML = signUpButtonRestored();
        }

        let activeTab = 'signin';

        function switchTab(tab) {
            if (tab !== 'signin' && tab !== 'signup') return;
            activeTab = tab;
            const signinEl = document.getElementById('signin-section');
            const signupEl = document.getElementById('signup-section');
            const ind = document.getElementById('tab-indicator');
            document.getElementById('tab-signin').classList.toggle('active', tab === 'signin');
            document.getElementById('tab-signup').classList.toggle('active', tab === 'signup');
            ind.style.transform = tab === 'signup' ? 'translateX(100%)' : 'translateX(0)';
            signinEl.classList.toggle('panel-hidden', tab !== 'signin');
            signupEl.classList.toggle('panel-hidden', tab !== 'signup');
            const header = document.getElementById('dynamic-header');
            if (tab === 'signin') {
                header.innerHTML = '<h2 class="welcome-text">' + t('auth.welcome_back') + '</h2><p class="sub-text">' + t('auth.signin_desc') + '</p>';
            } else {
                header.innerHTML = '<h2 class="welcome-text">' + t('auth.create_account') + '</h2><p class="sub-text">' + t('auth.signup_desc') + '</p>';
            }
        }

        function wirePwdToggle(inputId, btnId) {
            const inp = document.getElementById(inputId);
            const btn = document.getElementById(btnId);
            const icon = btn.querySelector('i');
            btn.addEventListener('click', () => {
                inp.type = inp.type === 'password' ? 'text' : 'password';
                icon.classList.toggle('ri-eye-off-line', inp.type === 'password');
                icon.classList.toggle('ri-eye-line', inp.type === 'text');
            });
        }

        const strengthColors = ['#ef4444','#f97316','#eab308','#22c55e'];
        function checkStrength(pwd) {
            const wrap = document.getElementById('strength-wrap');
            if (!pwd) { wrap.style.display = 'none'; return; }
            wrap.style.display = 'block';
            let score = 0;
            if (pwd.length >= 8) score++;
            if (/[A-Z]/.test(pwd)) score++;
            if (/[0-9]/.test(pwd)) score++;
            if (/[^A-Za-z0-9]/.test(pwd)) score++;
            const idx = Math.max(0, score - 1);
            const color = strengthColors[idx];
            for (let i = 0; i < 4; i++) {
                document.getElementById('sb' + i).style.background = i < score ? color : 'rgba(255,255,255,0.08)';
            }
            const labels = [t('auth.strength.too_weak'), t('auth.strength.fair'), t('auth.strength.good'), t('auth.strength.strong')];
            const lbl = document.getElementById('strength-label');
            lbl.textContent = labels[idx];
            lbl.style.color = color;
        }

        function shakeEl(id) {
            const el = document.getElementById(id);
            el.classList.remove('shake');
            void el.offsetWidth;
            el.classList.add('shake');
        }

        document.getElementById('tab-signin').addEventListener('click', () => switchTab('signin'));
        document.getElementById('tab-signup').addEventListener('click', () => switchTab('signup'));

        document.getElementById('form-signin').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('si-email').value.trim();
            const pwd = document.getElementById('si-password').value;
            const btn = document.getElementById('si-btn');
            btn.disabled = true;
            btn.innerHTML = primaryBtnLoading();
            loginWithEmailPwd(email, pwd).catch((err) => {
                restoreSignInButton();
                shakeEl('signin-section');
                toast(String(err?.message || '').replace(/^Firebase:\s*/,'').replace(/\s*\(auth\/[^)]+\)\s*$/,'') || 'Sign in failed.', 'error');
            });
        });

        document.getElementById('su-password').addEventListener('input', (e) => checkStrength(e.target.value));

        document.getElementById('form-signup').addEventListener('submit', (e) => {
            e.preventDefault();
            const name = document.getElementById('su-name').value.trim();
            const email = document.getElementById('su-email').value.trim();
            const pwd = document.getElementById('su-password').value;
            const btn = document.getElementById('su-btn');
            btn.disabled = true;
            btn.innerHTML = primaryBtnLoading();
            signUpWithEmail(email, pwd, name).catch((err) => {
                restoreSignUpButton();
                shakeEl('signup-section');
                toast(String(err?.message || '').replace(/^Firebase:\s*/,'').replace(/\s*\(auth\/[^)]+\)\s*$/,'') || 'Sign up failed.', 'error');
            });
        });

        document.getElementById('btn-google').addEventListener('click', () => loginWithGoogle());
        document.getElementById('btn-apple').addEventListener('click', () => loginWithApple());

        document.getElementById('forgot-link').addEventListener('click', async (e) => {
            e.preventDefault();
            const email = document.getElementById('si-email').value.trim();
            if (!email) {
                toast(t('auth.error_email') || 'Enter your email first.', 'info');
                return;
            }
            try {
                await sendPasswordResetEmail(auth, email);
                toast('Reset link sent to ' + email, 'success');
            } catch (err) {
                toast(String(err?.message || 'Could not send reset email.'), 'error');
            }
        });

        wirePwdToggle('si-password', 'si-eye');
        wirePwdToggle('su-password', 'su-eye');

        document.getElementById('su-terms-label').innerHTML = t('auth.terms_text');

        await auth.authStateReady();
        const path = location.pathname || '';
        if (/login\.html$/i.test(path) && auth.currentUser) {
            try {
                const u = auth.currentUser;
                const name = u.displayName || (u.email ? u.email.split('@')[0] : 'Farmer');
                localStorage.setItem('agri_user', JSON.stringify({ name, email: u.email || '' }));
            } catch (_) {}
            window.location.replace('index.html');
        }
    </script>
</body>
</html>
