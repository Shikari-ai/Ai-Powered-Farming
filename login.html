<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script>
    (function () {
      var h = location.hostname || "";
      if (!h.endsWith("github.io")) return;
      var path = location.pathname;
      var parts = path.split("/").filter(Boolean);
      var repo = parts[0];
      if (!repo || repo.indexOf(".") !== -1) return;
      if (path === "/" + repo) {
        location.replace("/" + repo + "/" + location.search + location.hash);
        return;
      }
      var b = document.createElement("base");
      b.href = "/" + repo + "/";
      var head = document.head || document.getElementsByTagName("head")[0];
      if (head) head.insertBefore(b, head.firstChild);
    })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Authentication - AgriTech AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        :root {
            --primary: #10b981;
            --primary-dim: #059669;
            --bg: #0f172a;
            --surface: #1e293b;
            --border: rgba(255, 255, 255, 0.1);
            --text: #f8fafc;
            --muted: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }

        body {
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 32px 20px 48px;
        }

        .wrap {
            width: 100%;
            max-width: 400px;
            position: relative;
            z-index: 1;
        }

        .brand {
            text-align: center;
            margin-bottom: 28px;
        }
        .brand .logo {
            width: 56px;
            height: 56px;
            margin: 0 auto 14px;
            border-radius: 14px;
            background: rgba(16, 185, 129, 0.12);
            border: 1px solid rgba(16, 185, 129, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary);
            font-size: 28px;
        }
        .brand h1 {
            font-size: 1.5rem;
            font-weight: 600;
        }
        .brand p {
            font-size: 0.8125rem;
            color: var(--muted);
            margin-top: 6px;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
        }

        #dynamic-header { margin-bottom: 20px; }
        .welcome-text { font-size: 1.25rem; font-weight: 600; margin-bottom: 4px; }
        .sub-text { font-size: 0.875rem; color: var(--muted); line-height: 1.4; }

        .tabs {
            display: flex;
            border-bottom: 1px solid var(--border);
            margin-bottom: 20px;
            position: relative;
        }
        .tab-btn {
            flex: 1;
            padding: 12px 8px;
            border: none;
            background: none;
            color: var(--muted);
            font-size: 0.8125rem;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
        }
        .tab-btn.active { color: var(--text); }
        .tab-ind {
            position: absolute;
            bottom: -1px;
            left: 0;
            width: 50%;
            height: 2px;
            background: var(--primary);
            transition: transform 0.25s ease;
        }

        .panel-hidden { display: none !important; }

        .row {
            display: flex;
            align-items: stretch;
            gap: 10px;
            margin-bottom: 14px;
        }
        .row .ico {
            width: 44px;
            flex-shrink: 0;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: rgba(15, 23, 42, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--muted);
            font-size: 20px;
        }
        .row:focus-within .ico { color: var(--primary); border-color: rgba(16, 185, 129, 0.35); }

        .field {
            flex: 1;
            min-width: 0;
        }
        .field label {
            display: block;
            font-size: 0.6875rem;
            font-weight: 500;
            color: var(--muted);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }
        .field input {
            width: 100%;
            padding: 12px 14px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: rgba(15, 23, 42, 0.6);
            color: var(--text);
            font-size: 0.9375rem;
            outline: none;
            font-family: inherit;
        }
        .field input:focus {
            border-color: rgba(16, 185, 129, 0.5);
        }

        .eye {
            width: 44px;
            flex-shrink: 0;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: rgba(15, 23, 42, 0.5);
            color: var(--muted);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }
        .eye:hover { color: var(--text); }

        .forgot-link {
            display: block;
            text-align: right;
            font-size: 0.8125rem;
            color: var(--primary);
            text-decoration: none;
            margin: -6px 0 18px;
        }
        .forgot-link:hover { text-decoration: underline; }

        .submit-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            margin-top: 4px;
        }
        .primary-btn {
            width: 100%;
            padding: 14px 16px;
            border: none;
            border-radius: 10px;
            background: var(--primary);
            color: #042f2e;
            font-size: 0.9375rem;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
        }
        .primary-btn:hover { background: var(--primary-dim); color: #fff; }
        .primary-btn:disabled { opacity: 0.65; cursor: not-allowed; }

        .login-icon-below {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: var(--muted);
            font-size: 0.75rem;
        }
        .login-icon-below i {
            font-size: 1.5rem;
            color: var(--primary);
        }

        .strength-wrap { margin: 4px 0 12px; }
        .strength-bars { display: flex; gap: 5px; margin-bottom: 5px; }
        .s-bar {
            flex: 1;
            height: 3px;
            border-radius: 2px;
            background: rgba(255,255,255,0.08);
        }
        .strength-label { font-size: 11px; color: var(--muted); }

        .terms-row {
            display: flex;
            gap: 10px;
            align-items: flex-start;
            margin: 8px 0 18px;
            font-size: 0.75rem;
            color: var(--muted);
        }
        .terms-row input { accent-color: var(--primary); margin-top: 3px; flex-shrink: 0; }

        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 20px 0;
            font-size: 0.75rem;
            color: var(--muted);
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .social-google {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #e2e8f0;
            background: #fff;
            color: #1e293b;
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            margin-bottom: 10px;
            font-family: inherit;
        }
        .social-google:hover { background: #f1f5f9; }

        .social-apple {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: #0a0a0a;
            color: #f8fafc;
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            font-family: inherit;
        }
        .social-apple:hover { background: #171717; }

        .security-badge {
            margin-top: 24px;
            padding: 14px;
            border-radius: 12px;
            border: 1px solid var(--border);
            font-size: 0.75rem;
            color: var(--muted);
            line-height: 1.45;
        }
        .security-badge strong {
            display: block;
            color: var(--text);
            font-weight: 500;
            margin-bottom: 4px;
        }

        .login-toast {
            position: fixed;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: #1e293b;
            color: white;
            padding: 13px 22px;
            border-radius: 14px;
            font-size: 0.8125rem;
            font-weight: 500;
            z-index: 9999;
            max-width: 88vw;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
            opacity: 0;
            pointer-events: none;
            transition: transform 0.35s ease, opacity 0.35s ease;
        }
        .login-toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }
        .login-toast.success { border-color: rgba(52,211,153,0.45); color: #6ee7b7; }
        .login-toast.error { border-color: rgba(239,68,68,0.45); color: #fca5a5; }
        .login-toast.info { border-color: rgba(96,165,250,0.45); color: #93c5fd; }

        @keyframes rotateSpin { to { transform: rotate(360deg); } }
        .spin { display: inline-block; animation: rotateSpin 0.7s linear infinite; }

        @keyframes shake {
            0%,100% { transform: translateX(0); }
            25% { transform: translateX(-6px); }
            75% { transform: translateX(6px); }
        }
        .shake { animation: shake 0.4s ease; }
    </style>
</head>
<body>
    <div class="login-toast" id="login-toast"></div>

    <div class="wrap">
        <div class="brand">
            <div class="logo"><i class="ri-leaf-fill"></i></div>
            <h1 data-i18n="auth.title">Smart Farming</h1>
            <p data-i18n="auth.subtitle">AI Powered Agriculture</p>
        </div>

        <div class="card">
            <div id="dynamic-header">
                <h2 class="welcome-text" data-i18n="auth.welcome_back">Welcome Back!</h2>
                <p class="sub-text" data-i18n="auth.signin_desc">Sign in to continue your smart farming journey</p>
            </div>

            <div class="tabs">
                <button type="button" class="tab-btn active" id="tab-signin" data-tab="signin" data-i18n="auth.signin_tab">Sign In</button>
                <button type="button" class="tab-btn" id="tab-signup" data-tab="signup" data-i18n="auth.signup_tab">Sign Up</button>
                <div class="tab-ind" id="tab-indicator"></div>
            </div>

            <!-- Sign in -->
            <div id="signin-section">
                <form id="form-signin">
                    <div class="row">
                        <div class="ico"><i class="ri-mail-line"></i></div>
                        <div class="field">
                            <label for="si-email" data-i18n="auth.email">Email Address</label>
                            <input type="email" id="si-email" name="email" autocomplete="email" required>
                        </div>
                    </div>
                    <div class="row">
                        <div class="ico"><i class="ri-lock-2-line"></i></div>
                        <div class="field">
                            <label for="si-password" data-i18n="auth.password">Password</label>
                            <input type="password" id="si-password" name="password" autocomplete="current-password" required>
                        </div>
                        <button type="button" class="eye" id="si-eye" aria-label="Show password"><i class="ri-eye-off-line"></i></button>
                    </div>
                    <a href="#" class="forgot-link" id="forgot-link" data-i18n="auth.forgot_password">Forgot Password?</a>
                    <div class="submit-wrap">
                        <button type="submit" class="primary-btn" id="si-btn" data-i18n="auth.signin_btn">Sign In</button>
                        <div class="login-icon-below" aria-hidden="true">
                            <i class="ri-login-circle-line"></i>
                            <span data-i18n="auth.signin_tab">Sign In</span>
                        </div>
                    </div>
                </form>
            </div>

            <!-- Sign up -->
            <div id="signup-section" class="panel-hidden">
                <form id="form-signup">
                    <div class="row">
                        <div class="ico"><i class="ri-user-line"></i></div>
                        <div class="field">
                            <label for="su-name" data-i18n="auth.full_name">Full Name</label>
                            <input type="text" id="su-name" name="name" autocomplete="name" required>
                        </div>
                    </div>
                    <div class="row">
                        <div class="ico"><i class="ri-mail-line"></i></div>
                        <div class="field">
                            <label for="su-email" data-i18n="auth.email">Email Address</label>
                            <input type="email" id="su-email" name="email" autocomplete="email" required>
                        </div>
                    </div>
                    <div class="row">
                        <div class="ico"><i class="ri-lock-2-line"></i></div>
                        <div class="field">
                            <label for="su-password" data-i18n="auth.password">Password</label>
                            <input type="password" id="su-password" name="password" autocomplete="new-password" required>
                        </div>
                        <button type="button" class="eye" id="su-eye" aria-label="Show password"><i class="ri-eye-off-line"></i></button>
                    </div>
                    <div class="strength-wrap" id="strength-wrap" style="display:none;">
                        <div class="strength-bars">
                            <div class="s-bar" id="sb0"></div>
                            <div class="s-bar" id="sb1"></div>
                            <div class="s-bar" id="sb2"></div>
                            <div class="s-bar" id="sb3"></div>
                        </div>
                        <div class="strength-label" id="strength-label"></div>
                    </div>
                    <div class="terms-row">
                        <input type="checkbox" required id="su-terms">
                        <label for="su-terms" id="su-terms-label">I agree to the Terms of Service and Privacy Policy</label>
                    </div>
                    <div class="submit-wrap">
                        <button type="submit" class="primary-btn" id="su-btn" data-i18n="auth.signup_btn">Create Account</button>
                        <div class="login-icon-below" aria-hidden="true">
                            <i class="ri-user-add-line"></i>
                            <span data-i18n="auth.signup_tab">Sign Up</span>
                        </div>
                    </div>
                </form>
            </div>

            <div class="divider" data-i18n="auth.or_continue">or continue with</div>

            <button type="button" class="social-google" id="btn-google">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="22" height="22" aria-hidden="true">
                  <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
                  <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
                  <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
                  <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
                </svg>
                <span data-i18n="auth.google_btn">Continue with Google</span>
            </button>

            <button type="button" class="social-apple" id="btn-apple">
                <i class="ri-apple-fill" style="font-size:22px;"></i>
                <span data-i18n="auth.apple_btn">Continue with Apple</span>
            </button>
        </div>

        <div class="security-badge">
            <strong data-i18n="auth.secure_title">Your data is protected</strong>
            <span data-i18n="auth.secure_desc">Sign-in uses industry-standard security. Always use a strong, unique password.</span>
        </div>
    </div>

    <script type="module">
        import { auth, loginWithEmailPwd, signUpWithEmail, loginWithGoogle } from './js/auth.js';
        import { initI18n, startI18nObserver, t } from './js/i18n.js';
        import { sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        function toast(msg, type = 'info', duration = 4000) {
            const el = document.getElementById('login-toast');
            el.textContent = msg;
            el.className = 'login-toast show ' + type;
            clearTimeout(el._timer);
            el._timer = setTimeout(() => el.classList.remove('show'), duration);
        }

        function restoreSignInButton() {
            const btn = document.getElementById('si-btn');
            btn.disabled = false;
            btn.textContent = t('auth.signin_btn');
        }

        function restoreSignUpButton() {
            const btn = document.getElementById('su-btn');
            btn.disabled = false;
            btn.textContent = t('auth.signup_btn');
        }

        let activeTab = 'signin';

        function switchTab(tab) {
            if (tab !== 'signin' && tab !== 'signup') return;
            activeTab = tab;
            const signinEl = document.getElementById('signin-section');
            const signupEl = document.getElementById('signup-section');
            const ind = document.getElementById('tab-indicator');
            document.getElementById('tab-signin').classList.toggle('active', tab === 'signin');
            document.getElementById('tab-signup').classList.toggle('active', tab === 'signup');
            ind.style.transform = tab === 'signup' ? 'translateX(100%)' : 'translateX(0)';
            signinEl.classList.toggle('panel-hidden', tab !== 'signin');
            signupEl.classList.toggle('panel-hidden', tab !== 'signup');
            const header = document.getElementById('dynamic-header');
            if (tab === 'signin') {
                header.innerHTML = '<h2 class="welcome-text">' + t('auth.welcome_back') + '</h2><p class="sub-text">' + t('auth.signin_desc') + '</p>';
            } else {
                header.innerHTML = '<h2 class="welcome-text">' + t('auth.create_account') + '</h2><p class="sub-text">' + t('auth.signup_desc') + '</p>';
            }
        }

        function wirePwdToggle(inputId, btnId) {
            const inp = document.getElementById(inputId);
            const btn = document.getElementById(btnId);
            const icon = btn.querySelector('i');
            btn.addEventListener('click', () => {
                inp.type = inp.type === 'password' ? 'text' : 'password';
                icon.classList.toggle('ri-eye-off-line', inp.type === 'password');
                icon.classList.toggle('ri-eye-line', inp.type === 'text');
            });
        }

        const strengthColors = ['#ef4444','#f97316','#eab308','#22c55e'];
        function checkStrength(pwd) {
            const wrap = document.getElementById('strength-wrap');
            if (!pwd) { wrap.style.display = 'none'; return; }
            wrap.style.display = 'block';
            let score = 0;
            if (pwd.length >= 8) score++;
            if (/[A-Z]/.test(pwd)) score++;
            if (/[0-9]/.test(pwd)) score++;
            if (/[^A-Za-z0-9]/.test(pwd)) score++;
            const idx = Math.max(0, score - 1);
            const color = strengthColors[idx];
            for (let i = 0; i < 4; i++) {
                document.getElementById('sb' + i).style.background = i < score ? color : 'rgba(255,255,255,0.08)';
            }
            const labels = [t('auth.strength.too_weak'), t('auth.strength.fair'), t('auth.strength.good'), t('auth.strength.strong')];
            const lbl = document.getElementById('strength-label');
            lbl.textContent = labels[idx];
            lbl.style.color = color;
        }

        function shakeEl(id) {
            const el = document.getElementById(id);
            el.classList.remove('shake');
            void el.offsetWidth;
            el.classList.add('shake');
        }

        async function wireLoginPage() {
            document.getElementById('tab-signin').addEventListener('click', () => switchTab('signin'));
            document.getElementById('tab-signup').addEventListener('click', () => switchTab('signup'));

            document.getElementById('form-signin').addEventListener('submit', (e) => {
                e.preventDefault();
                const email = document.getElementById('si-email').value.trim();
                const pwd = document.getElementById('si-password').value;
                const btn = document.getElementById('si-btn');
                btn.disabled = true;
                btn.innerHTML = '<i class="ri-loader-4-line spin"></i>';
                loginWithEmailPwd(email, pwd).catch((err) => {
                    restoreSignInButton();
                    shakeEl('signin-section');
                    toast(String(err?.message || '').replace(/^Firebase:\s*/,'').replace(/\s*\(auth\/[^)]+\)\s*$/,'') || 'Sign in failed.', 'error');
                });
            });

            document.getElementById('su-password').addEventListener('input', (e) => checkStrength(e.target.value));

            document.getElementById('form-signup').addEventListener('submit', (e) => {
                e.preventDefault();
                const name = document.getElementById('su-name').value.trim();
                const email = document.getElementById('su-email').value.trim();
                const pwd = document.getElementById('su-password').value;
                const btn = document.getElementById('su-btn');
                btn.disabled = true;
                btn.innerHTML = '<i class="ri-loader-4-line spin"></i>';
                signUpWithEmail(email, pwd, name).catch((err) => {
                    restoreSignUpButton();
                    shakeEl('signup-section');
                    toast(String(err?.message || '').replace(/^Firebase:\s*/,'').replace(/\s*\(auth\/[^)]+\)\s*$/,'') || 'Sign up failed.', 'error');
                });
            });

            document.getElementById('btn-google').addEventListener('click', () => loginWithGoogle());
            document.getElementById('btn-apple').addEventListener('click', () => loginWithGoogle());

            document.getElementById('forgot-link').addEventListener('click', async (e) => {
                e.preventDefault();
                const email = document.getElementById('si-email').value.trim();
                if (!email) {
                    toast(t('auth.error_email') || 'Enter your email first.', 'info');
                    return;
                }
                try {
                    await sendPasswordResetEmail(auth, email);
                    toast('Reset link sent to ' + email, 'success');
                } catch (err) {
                    toast(String(err?.message || 'Could not send reset email.'), 'error');
                }
            });

            wirePwdToggle('si-password', 'si-eye');
            wirePwdToggle('su-password', 'su-eye');

            document.getElementById('su-terms-label').innerHTML = t('auth.terms_text');
            window.switchTab = switchTab;

            try {
                await auth.authStateReady();
                const path = location.pathname || '';
                if (/login\.html$/i.test(path) && auth.currentUser) {
                    try {
                        const u = auth.currentUser;
                        const name = u.displayName || (u.email ? u.email.split('@')[0] : 'Farmer');
                        localStorage.setItem('agri_user', JSON.stringify({ name, email: u.email || '' }));
                    } catch (_) {}
                    window.location.replace('index.html');
                }
            } catch (_) {}
        }

        (async function boot() {
            try {
                await initI18n();
            } catch (err) {
                console.error('[login] initI18n failed', err);
                toast('Could not load translations. Check your connection and refresh.', 'error', 8000);
            }
            startI18nObserver();
            await wireLoginPage();
        })();
    </script>
</body>
</html>
