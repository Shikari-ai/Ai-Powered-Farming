<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script>
    (function () {
      var h = location.hostname || "";
      if (!h.endsWith("github.io")) return;
      var path = location.pathname;
      var parts = path.split("/").filter(Boolean);
      var repo = parts[0];
      if (!repo || repo.indexOf(".") !== -1) return;
      if (path === "/" + repo) {
        location.replace("/" + repo + "/" + location.search + location.hash);
        return;
      }
      var b = document.createElement("base");
      b.href = "/" + repo + "/";
      var head = document.head || document.getElementsByTagName("head")[0];
      if (head) head.insertBefore(b, head.firstChild);
    })();
    </script>
    <!-- interactive-widget=resizes-content keeps fixed header anchored when the
         keyboard rises on Android Chrome / Edge. iOS Safari uses the
         VisualViewport JS fallback in assistant.js. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content">
    <title>AI Assistant — AgriTech AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <link rel="stylesheet" href="css/design-tokens.css?v=2">
    <script src="js/device-adaptive-shell.js?v=1"></script>
    <link rel="stylesheet" href="css/adaptive-shell.css?v=1">
    <style>
        :root {
            --aa-bg: #02080a;
            --aa-emerald: #10b981;
            --aa-emerald-glow: rgba(16, 185, 129, 0.45);
            --aa-emerald-dim: rgba(16, 185, 129, 0.18);
            --aa-teal: #0d9488;
            --aa-cyan: rgba(34, 211, 238, 0.55);
            --aa-text: #ecfdf5;
            --aa-dim: rgba(236, 253, 245, 0.55);
            --aa-muted: rgba(236, 253, 245, 0.40);
            --aa-glass: rgba(8, 16, 14, 0.55);
            --aa-glass-strong: rgba(6, 12, 10, 0.78);
            --aa-line: rgba(16, 185, 129, 0.18);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body {
            background: var(--aa-bg);
            color: var(--aa-text);
            overflow-x: hidden;
            min-height: 100vh;
            min-height: 100dvh;
        }

        /* ── Ambient background ── */
        /* Layered radial glows + a subtle aurora flow that drifts slowly. Plus
           a static SVG noise overlay for grain. The whole thing sits behind
           everything else and never receives pointer events. */
        .aa-ambient {
            position: fixed; inset: 0; z-index: 0;
            pointer-events: none; overflow: hidden;
            background:
                radial-gradient(ellipse 80% 50% at 50% 0%, rgba(16, 185, 129, 0.18) 0%, transparent 55%),
                radial-gradient(ellipse 60% 50% at 100% 30%, rgba(13, 148, 136, 0.12) 0%, transparent 55%),
                radial-gradient(ellipse 60% 60% at 0% 70%, rgba(34, 211, 238, 0.08) 0%, transparent 60%),
                linear-gradient(180deg, #02080a 0%, #010608 100%);
        }
        .aa-aurora {
            position: absolute; inset: -20% -20%;
            background:
                conic-gradient(from 0deg at 50% 50%,
                    rgba(16, 185, 129, 0.12) 0deg,
                    transparent 60deg,
                    rgba(34, 211, 238, 0.08) 180deg,
                    transparent 240deg,
                    rgba(16, 185, 129, 0.10) 360deg);
            filter: blur(80px);
            animation: aaAuroraSpin 60s linear infinite;
            opacity: 0.55;
        }
        @keyframes aaAuroraSpin { to { transform: rotate(360deg); } }
        .aa-waves {
            position: absolute; left: 0; right: 0; top: 28%; height: 280px;
            opacity: 0.55;
        }
        .aa-waves svg { width: 100%; height: 100%; display: block; }
        .aa-waves path {
            fill: none; stroke: rgba(16, 185, 129, 0.20);
            stroke-width: 1; stroke-linecap: round;
        }
        .aa-waves path.w-2 { stroke: rgba(16, 185, 129, 0.10); }
        .aa-waves path.w-3 { stroke: rgba(34, 211, 238, 0.10); }

        /* Floating glow dust */
        .aa-dust { position: absolute; inset: 0; }
        .aa-dust span {
            position: absolute;
            width: 3px; height: 3px; border-radius: 50%;
            background: rgba(16, 185, 129, 0.9);
            box-shadow: 0 0 6px rgba(16, 185, 129, 0.7);
            animation: aaDustFloat 18s linear infinite;
            opacity: 0;
        }
        @keyframes aaDustFloat {
            0%   { transform: translate3d(0, 100vh, 0) scale(0.6); opacity: 0; }
            10%  { opacity: 0.7; }
            85%  { opacity: 0.5; }
            100% { transform: translate3d(20px, -20vh, 0) scale(1); opacity: 0; }
        }
        @media (prefers-reduced-motion: reduce) {
            .aa-aurora, .aa-dust span { animation: none !important; }
        }

        /* ── App shell ── */
        .aa-app {
            position: relative;
            z-index: 1;
            max-width: 480px;
            margin: 0 auto;
            min-height: 100vh;
            min-height: 100dvh;
            display: flex; flex-direction: column;
            padding-bottom: 200px; /* room for composer + dock */
        }

        /* ── Fixed header ── */
        .aa-header {
            position: fixed; top: 0; left: 50%; transform: translateX(-50%);
            width: 100%; max-width: 480px;
            z-index: 50;
            padding: calc(14px + env(safe-area-inset-top, 0px)) 16px 12px;
            display: flex; align-items: center; justify-content: space-between;
            gap: 10px;
            background: linear-gradient(180deg, rgba(2, 8, 10, 0.92) 0%, rgba(2, 8, 10, 0.0) 100%);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            box-sizing: border-box;
        }
        .aa-hdr-left { display: flex; align-items: center; gap: 10px; min-width: 0; flex: 1; }
        .aa-hdr-actions { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
        .aa-icon-btn {
            width: 42px; height: 42px; border-radius: 13px;
            display: flex; align-items: center; justify-content: center;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.07);
            color: var(--aa-text); font-size: 20px;
            cursor: pointer; transition: background 0.18s ease, border-color 0.18s ease, transform 0.12s;
            flex-shrink: 0;
        }
        .aa-icon-btn:active { transform: scale(0.92); }
        .aa-icon-btn:hover { background: rgba(16, 185, 129, 0.08); border-color: rgba(16, 185, 129, 0.18); }
        .aa-title { min-width: 0; overflow: hidden; }
        .aa-title h1 {
            font-size: 18px; font-weight: 600; letter-spacing: 0.2px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            display: flex; align-items: center; gap: 6px;
        }
        .aa-title h1 .aa-spark { color: var(--aa-emerald); font-size: 14px; filter: drop-shadow(0 0 4px var(--aa-emerald-glow)); }
        .aa-title p {
            font-size: 11px; color: var(--aa-dim); margin-top: 2px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            letter-spacing: 0.1px;
        }

        /* Model picker AUTO pill */
        .aa-model-pill {
            width: auto !important;
            padding: 0 12px;
            gap: 7px;
            border-radius: 999px !important;
            font-size: 13px !important;
            border: 1px solid rgba(16, 185, 129, 0.32) !important;
            background: linear-gradient(180deg, rgba(16, 185, 129, 0.10), rgba(16, 185, 129, 0.03)) !important;
            color: var(--aa-emerald) !important;
            font-weight: 600;
            min-width: 76px;
            justify-content: center !important;
        }
        .aa-model-pill[aria-expanded="true"] { background: rgba(16, 185, 129, 0.18) !important; }
        .aa-model-pill .aa-pill-dot {
            width: 8px; height: 8px; border-radius: 50%;
            background: var(--aa-emerald);
            box-shadow: 0 0 8px var(--aa-emerald-glow);
            animation: aaDotPulse 2.4s ease-in-out infinite;
        }
        @keyframes aaDotPulse { 50% { opacity: 0.4; box-shadow: 0 0 4px var(--aa-emerald-glow); } }
        .aa-model-pill .aa-pill-label { font-size: 12px; letter-spacing: 0.5px; }

        /* ── Model / chat menu (popover) ──
           position: fixed so the menu is anchored to the viewport (same
           coordinate space as .aa-header). Previously position: absolute
           relative to .aa-app meant the menu sat at document-y=70 — when
           the user had scrolled the chat, the menu was off-screen above
           the viewport, looking like nothing opened. */
        .aa-menu {
            position: fixed; top: calc(70px + env(safe-area-inset-top, 0px)); right: 12px;
            z-index: 60;
            min-width: 280px; max-width: calc(100vw - 24px);
            background: rgba(6, 12, 10, 0.96);
            border: 1px solid rgba(16, 185, 129, 0.18);
            border-radius: 18px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6), 0 0 30px rgba(16, 185, 129, 0.08);
            backdrop-filter: blur(22px); -webkit-backdrop-filter: blur(22px);
            padding: 6px;
            animation: aaMenuIn 0.16s ease-out;
        }
        @keyframes aaMenuIn { from { opacity: 0; transform: translateY(-6px) scale(0.97); } to { opacity: 1; transform: none; } }
        .aa-menu-opt {
            all: unset; cursor: pointer; box-sizing: border-box;
            display: flex; align-items: center; gap: 11px;
            width: 100%; padding: 10px 12px; border-radius: 12px;
            transition: background 0.12s ease;
        }
        .aa-menu-opt:hover { background: rgba(16, 185, 129, 0.08); }
        .aa-menu-opt > i:first-child { font-size: 18px; color: rgba(236, 253, 245, 0.65); flex-shrink: 0; }
        .aa-menu-meta { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 2px; }
        .aa-menu-meta strong { font-size: 13px; font-weight: 600; color: var(--aa-text); }
        .aa-menu-meta span { font-size: 11px; color: var(--aa-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .aa-menu-check { font-size: 16px; color: var(--aa-emerald); opacity: 0; flex-shrink: 0; }
        .aa-menu-opt.is-selected { background: rgba(16, 185, 129, 0.10); }
        .aa-menu-opt.is-selected .aa-menu-check { opacity: 1; }
        .aa-menu-opt.is-selected .aa-menu-meta strong { color: var(--aa-emerald); }
        .aa-menu-sep { height: 1px; background: rgba(16, 185, 129, 0.10); margin: 6px 4px; }
        .aa-menu-opt.danger:hover { background: rgba(244, 63, 94, 0.10); }
        .aa-menu-opt.danger > i:first-child { color: rgba(244, 113, 99, 0.85); }
        .aa-menu-opt.danger .aa-menu-meta strong { color: rgba(252, 165, 165, 0.95); }

        /* ── Hero (AI Orb) ── */
        .aa-hero {
            padding: 110px 20px 8px;
            display: flex; flex-direction: column; align-items: center;
            text-align: center;
            position: relative;
        }
        .aa-orb-wrap {
            position: relative;
            width: 240px; height: 240px;
            display: flex; align-items: center; justify-content: center;
        }
        .aa-orb {
            position: relative;
            width: 156px; height: 156px;
            border-radius: 50%;
            background:
                radial-gradient(circle at 35% 35%, rgba(167, 243, 208, 0.85) 0%, rgba(16, 185, 129, 0.65) 18%, rgba(6, 95, 70, 0.4) 50%, transparent 75%),
                radial-gradient(circle at 60% 70%, rgba(34, 211, 238, 0.35) 0%, transparent 55%);
            box-shadow:
                inset 0 0 40px rgba(167, 243, 208, 0.35),
                inset 0 -20px 30px rgba(0, 0, 0, 0.6),
                0 0 60px rgba(16, 185, 129, 0.55),
                0 0 120px rgba(16, 185, 129, 0.35);
            animation: aaOrbPulse 4.2s ease-in-out infinite;
            z-index: 3;
        }
        .aa-orb::before {
            content: ""; position: absolute; inset: 8px;
            border-radius: 50%;
            background: radial-gradient(circle at 50% 50%, transparent 55%, rgba(0, 0, 0, 0.55) 100%);
            pointer-events: none;
        }
        .aa-orb-leaf {
            position: absolute; inset: 0;
            display: flex; align-items: center; justify-content: center;
            font-size: 56px; color: rgba(187, 247, 208, 0.95);
            filter: drop-shadow(0 0 12px rgba(16, 185, 129, 0.8));
            z-index: 4;
        }
        @keyframes aaOrbPulse {
            0%, 100% {
                transform: scale(1);
                box-shadow:
                    inset 0 0 40px rgba(167, 243, 208, 0.35),
                    inset 0 -20px 30px rgba(0, 0, 0, 0.6),
                    0 0 60px rgba(16, 185, 129, 0.55),
                    0 0 120px rgba(16, 185, 129, 0.35);
            }
            50% {
                transform: scale(1.03);
                box-shadow:
                    inset 0 0 50px rgba(167, 243, 208, 0.45),
                    inset 0 -20px 30px rgba(0, 0, 0, 0.6),
                    0 0 80px rgba(16, 185, 129, 0.75),
                    0 0 160px rgba(16, 185, 129, 0.4);
            }
        }
        /* Concentric rings */
        .aa-ring {
            position: absolute;
            top: 50%; left: 50%;
            border-radius: 50%;
            border: 1px solid rgba(16, 185, 129, 0.20);
            transform: translate(-50%, -50%);
            pointer-events: none;
        }
        .aa-ring.r1 { width: 200px; height: 200px; animation: aaRingSpin 18s linear infinite; }
        .aa-ring.r2 { width: 232px; height: 232px; border-color: rgba(16, 185, 129, 0.12); animation: aaRingSpin 24s linear infinite reverse; }
        .aa-ring.r1::before, .aa-ring.r2::before {
            content: ""; position: absolute;
            width: 6px; height: 6px; border-radius: 50%;
            background: var(--aa-emerald);
            box-shadow: 0 0 12px var(--aa-emerald);
            top: -3px; left: 50%; transform: translateX(-50%);
        }
        .aa-ring.r2::before { background: rgba(34, 211, 238, 0.85); box-shadow: 0 0 12px rgba(34, 211, 238, 0.7); }
        @keyframes aaRingSpin { to { transform: translate(-50%, -50%) rotate(360deg); } }
        /* Dashed outer arc */
        .aa-arc {
            position: absolute; top: 50%; left: 50%;
            width: 270px; height: 270px;
            border-radius: 50%;
            border: 1px dashed rgba(16, 185, 129, 0.18);
            transform: translate(-50%, -50%);
            animation: aaRingSpin 40s linear infinite;
            pointer-events: none;
        }
        @media (prefers-reduced-motion: reduce) {
            .aa-orb, .aa-ring, .aa-arc { animation: none !important; }
        }

        .aa-greet {
            margin-top: 26px;
            font-size: 22px; font-weight: 600; letter-spacing: 0.2px;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .aa-greet .wave {
            display: inline-block; transform-origin: 70% 70%;
            animation: aaWaveHand 2.6s ease-in-out infinite;
        }
        @keyframes aaWaveHand {
            0%, 60%, 100% { transform: rotate(0deg); }
            10% { transform: rotate(14deg); }
            20% { transform: rotate(-8deg); }
            30% { transform: rotate(14deg); }
            40% { transform: rotate(-4deg); }
            50% { transform: rotate(10deg); }
        }
        .aa-sub {
            margin-top: 6px;
            font-size: 13.5px; color: var(--aa-dim);
            letter-spacing: 0.15px;
        }

        /* ── Single CTA card: Scan Field ── */
        .aa-cards { padding: 24px 16px 12px; }
        .aa-card {
            position: relative;
            display: flex; align-items: center; gap: 14px;
            padding: 16px 16px 16px 14px;
            border-radius: 22px;
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.07) 0%, rgba(255, 255, 255, 0.02) 100%);
            border: 1px solid rgba(16, 185, 129, 0.22);
            box-shadow:
                inset 0 1px 0 rgba(255, 255, 255, 0.04),
                0 12px 30px rgba(0, 0, 0, 0.45);
            cursor: pointer;
            overflow: hidden;
            transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
            text-decoration: none; color: inherit;
        }
        .aa-card:hover { transform: translateY(-2px); border-color: rgba(16, 185, 129, 0.40); box-shadow: 0 18px 36px rgba(0,0,0,0.5), 0 0 20px rgba(16, 185, 129, 0.18); }
        .aa-card:active { transform: scale(0.985); }
        /* Soft light-sweep */
        .aa-card::after {
            content: ""; position: absolute; inset: 0;
            background: linear-gradient(120deg, transparent 20%, rgba(167, 243, 208, 0.12) 50%, transparent 80%);
            transform: translateX(-100%);
            pointer-events: none;
        }
        .aa-card:hover::after { animation: aaSweep 1.4s ease forwards; }
        @keyframes aaSweep { to { transform: translateX(100%); } }
        .aa-card-icon {
            width: 52px; height: 52px; flex-shrink: 0;
            border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            background: rgba(16, 185, 129, 0.10);
            border: 1px solid rgba(16, 185, 129, 0.35);
            color: var(--aa-emerald);
            font-size: 24px;
            position: relative;
        }
        .aa-card-icon::after {
            content: ""; position: absolute; inset: -1px;
            border-radius: 14px; pointer-events: none;
            box-shadow: 0 0 14px rgba(16, 185, 129, 0.35);
            opacity: 0.6;
        }
        .aa-card-body { flex: 1; min-width: 0; }
        .aa-card-title { font-size: 17px; font-weight: 600; letter-spacing: 0.1px; }
        .aa-card-desc { font-size: 12.5px; color: var(--aa-dim); margin-top: 3px; line-height: 1.45; }
        .aa-card-chev {
            width: 34px; height: 34px; border-radius: 50%;
            border: 1px solid rgba(16, 185, 129, 0.4);
            color: var(--aa-emerald); font-size: 18px;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
            background: rgba(16, 185, 129, 0.05);
        }

        /* ── Chat messages list (hidden until first message) ── */
        .aa-chat { padding: 8px 16px 0; display: flex; flex-direction: column; gap: 12px; }
        .aa-chat:empty { display: none; }
        .msg {
            max-width: 86%;
            padding: 12px 14px; border-radius: 18px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.06);
            font-size: 13.5px; line-height: 1.5;
        }
        .msg.user { align-self: flex-end; background: rgba(16, 185, 129, 0.12); border-color: rgba(16, 185, 129, 0.28); border-bottom-right-radius: 6px; }
        .msg.assistant { align-self: flex-start; border-bottom-left-radius: 6px; }
        .msg .meta { font-size: 10px; color: var(--aa-muted); margin-bottom: 6px; display: flex; gap: 8px; justify-content: space-between; }
        .msg .text { white-space: pre-wrap; color: rgba(236, 253, 245, 0.95); }
        .msg.is-superseded { opacity: 0.62; }
        .msg.is-superseded .text { text-decoration: line-through; text-decoration-color: rgba(255,255,255,0.32); }
        .msg-superseded { font-size: 11px; color: var(--aa-muted); margin-top: 6px; font-style: italic; }

        /* Streaming/thinking */
        .typing-dots { display: flex; gap: 6px; padding: 2px 0; }
        .typing-dots span {
            width: 7px; height: 7px; border-radius: 50%;
            background: var(--aa-emerald);
            animation: aaTyping 1.05s ease-in-out infinite;
            opacity: 0.4;
        }
        .typing-dots span:nth-child(2) { animation-delay: 0.18s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.36s; }
        @keyframes aaTyping { 40% { opacity: 1; transform: translateY(-2px); } }
        .msg.streaming-reply {
            border-color: rgba(16, 185, 129, 0.32);
            box-shadow: 0 0 0 1px rgba(16, 185, 129, 0.08);
        }
        .msg.streaming-reply.thinking { animation: aaThinkGlow 2.4s ease-in-out infinite; }
        @keyframes aaThinkGlow {
            50% { box-shadow: 0 0 22px rgba(16, 185, 129, 0.20), 0 0 0 1px rgba(16, 185, 129, 0.18); }
        }
        .stream-thinking-glow {
            height: 2px; border-radius: 2px; margin: 0 0 8px;
            background: linear-gradient(90deg, transparent, rgba(167, 243, 208, 0.55), transparent);
            background-size: 200% 100%;
            animation: aaShimmer 1.6s linear infinite;
        }
        .msg.streaming-reply:not(.thinking) .stream-thinking-glow { opacity: 0; height: 0; margin: 0; }
        @keyframes aaShimmer { from { background-position: 100% 0; } to { background-position: -100% 0; } }
        .stream-caret {
            display: inline-block; width: 2px; height: 1.05em;
            margin-left: 3px; vertical-align: -0.14em;
            background: var(--aa-emerald);
            border-radius: 1px;
            animation: aaCaret 1.1s ease-in-out infinite;
        }
        @keyframes aaCaret { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }
        .stream-caret-out { opacity: 0; }
        .msg .text.is-rich { white-space: normal; }
        .msg .text.is-rich strong { color: rgba(236, 253, 245, 0.98); font-weight: 600; }
        .msg .text.is-rich .assist-pre {
            margin: 8px 0; padding: 10px 12px; border-radius: 10px;
            background: rgba(0, 0, 0, 0.35);
            border: 1px solid rgba(255, 255, 255, 0.06);
            font-size: 12px; line-height: 1.4;
            font-family: ui-monospace, monospace;
            overflow-x: auto;
            color: rgba(226, 232, 240, 0.95);
        }

        /* ── Composer (floating chat input) ── */
        .aa-composer {
            position: fixed; left: 50%; transform: translateX(-50%);
            bottom: calc(94px + env(safe-area-inset-bottom, 0px));
            width: 100%; max-width: 460px;
            padding: 0 12px;
            z-index: 40;
        }
        .aa-composer-inner {
            display: flex; align-items: center; gap: 10px;
            padding: 8px 8px 8px 8px;
            border-radius: 999px;
            background: rgba(8, 16, 14, 0.7);
            border: 1px solid rgba(16, 185, 129, 0.18);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            box-shadow:
                0 18px 40px rgba(0, 0, 0, 0.55),
                inset 0 1px 0 rgba(255, 255, 255, 0.04);
            transition: border-color 0.22s ease, box-shadow 0.22s ease;
        }
        body.assistant-composer-focus .aa-composer-inner {
            border-color: rgba(16, 185, 129, 0.55);
            box-shadow:
                0 18px 40px rgba(0, 0, 0, 0.55),
                0 0 30px rgba(16, 185, 129, 0.22),
                inset 0 1px 0 rgba(255, 255, 255, 0.06);
        }
        .aa-mic {
            width: 40px; height: 40px; border-radius: 50%;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: var(--aa-text); font-size: 18px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; flex-shrink: 0;
            transition: background 0.18s ease, transform 0.12s, border-color 0.18s ease;
            position: relative;
        }
        .aa-mic:active { transform: scale(0.92); }
        .aa-mic:hover { background: rgba(16, 185, 129, 0.10); border-color: rgba(16, 185, 129, 0.30); }
        .aa-mic.recording {
            background: rgba(244, 63, 94, 0.18);
            border-color: rgba(244, 63, 94, 0.55);
            color: #fca5a5;
            animation: aaMicPulse 1.2s ease-in-out infinite;
        }
        @keyframes aaMicPulse {
            50% { box-shadow: 0 0 0 6px rgba(244, 63, 94, 0.10); }
        }
        .aa-input {
            flex: 1; min-width: 0;
            background: transparent;
            border: none; outline: none;
            color: var(--aa-text); font-size: 14px;
            padding: 0 4px;
            font-family: inherit;
        }
        .aa-input::placeholder { color: var(--aa-muted); }
        .aa-send {
            width: 44px; height: 44px; border-radius: 50%;
            background: linear-gradient(180deg, #34d399, #10b981);
            border: none; color: #062019; font-size: 19px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; flex-shrink: 0;
            box-shadow: 0 8px 20px rgba(16, 185, 129, 0.45), inset 0 1px 0 rgba(255, 255, 255, 0.25);
            transition: transform 0.12s, box-shadow 0.18s;
        }
        .aa-send:active { transform: scale(0.93); }
        .aa-send:hover { box-shadow: 0 10px 24px rgba(16, 185, 129, 0.55), inset 0 1px 0 rgba(255, 255, 255, 0.3); }
        .aa-send[disabled] { opacity: 0.5; cursor: default; }
        .aa-attach-hidden { display: none; }

        /* ── Floating 3-tab dock ── */
        /* Hide the global 5-tab bottom-nav on this page; we render our own
           scoped dock so the global nav (used by every other page) stays
           untouched. */
        body.assistant-page .bottom-nav { display: none !important; }
        .aa-dock {
            position: fixed; left: 50%; transform: translateX(-50%);
            bottom: calc(16px + env(safe-area-inset-bottom, 0px));
            z-index: 41;
            display: flex; align-items: center;
            padding: 6px; gap: 4px;
            border-radius: 999px;
            background: rgba(8, 16, 14, 0.72);
            border: 1px solid rgba(16, 185, 129, 0.20);
            backdrop-filter: blur(22px); -webkit-backdrop-filter: blur(22px);
            box-shadow:
                0 16px 40px rgba(0, 0, 0, 0.55),
                0 0 24px rgba(16, 185, 129, 0.10),
                inset 0 1px 0 rgba(255, 255, 255, 0.04);
        }
        .aa-dock-item {
            display: flex; flex-direction: column; align-items: center; gap: 2px;
            padding: 8px 12px; border-radius: 999px;
            color: rgba(236, 253, 245, 0.55);
            text-decoration: none;
            transition: color 0.18s ease, background 0.18s ease;
        }
        .aa-dock-item i { font-size: 20px; }
        .aa-dock-item span { font-size: 10px; font-weight: 500; }
        .aa-dock-item:hover { color: var(--aa-text); }
        .aa-dock-item.active {
            color: var(--aa-emerald);
        }
        .aa-dock-item.active i {
            filter: drop-shadow(0 0 6px rgba(16, 185, 129, 0.7));
        }
        /* Scan: leaf icon inside a circular emerald border. Icon stays the
           same size as the others (20px); the circle is just a glowing
           ring around it. Pushed slightly up to give the dock the cinematic
           "raised scan" feel from the reference without making the icon
           larger. */
        .aa-dock-scan {
            padding: 4px 12px;
        }
        .aa-dock-scan .aa-scan-ring {
            width: 46px; height: 46px;
            border-radius: 50%;
            border: 1.5px solid rgba(16, 185, 129, 0.55);
            display: flex; align-items: center; justify-content: center;
            box-shadow:
                0 0 18px rgba(16, 185, 129, 0.35),
                inset 0 0 12px rgba(16, 185, 129, 0.18);
            color: var(--aa-emerald);
            position: relative;
            background: rgba(8, 16, 14, 0.55);
        }
        .aa-dock-scan .aa-scan-ring i {
            font-size: 20px; /* matches the other dock icons exactly */
            filter: drop-shadow(0 0 6px rgba(16, 185, 129, 0.7));
        }
        .aa-dock-scan .aa-scan-ring::after {
            content: ""; position: absolute; inset: -4px;
            border-radius: 50%;
            border: 1px dashed rgba(16, 185, 129, 0.18);
            animation: aaScanSpin 12s linear infinite;
            pointer-events: none;
        }
        @keyframes aaScanSpin { to { transform: rotate(360deg); } }
        @media (prefers-reduced-motion: reduce) {
            .aa-dock-scan .aa-scan-ring::after { animation: none; }
        }
        .aa-dock-scan span { margin-top: 2px; }

        /* Mobile keyboard: hide dock + drop composer onto keyboard */
        @media (pointer: coarse) {
            body.assistant-page.assistant-composer-focus .aa-dock { display: none; }
            body.assistant-page.assistant-composer-focus .aa-composer {
                bottom: env(safe-area-inset-bottom, 0px);
            }
        }

        .hidden { display: none !important; }
    </style>
</head>
<body class="assistant-page">

    <!-- Ambient cinematic background -->
    <div class="aa-ambient" aria-hidden="true">
        <div class="aa-aurora"></div>
        <div class="aa-waves">
            <svg viewBox="0 0 480 240" preserveAspectRatio="none">
                <path d="M 0 120 Q 80 60 160 120 T 320 120 T 480 120" />
                <path class="w-2" d="M 0 140 Q 80 80 160 140 T 320 140 T 480 140" />
                <path class="w-3" d="M 0 160 Q 80 100 160 160 T 320 160 T 480 160" />
            </svg>
        </div>
        <div class="aa-dust">
            <span style="left:10%; animation-delay: 0s; animation-duration: 22s;"></span>
            <span style="left:25%; animation-delay: 4s; animation-duration: 18s;"></span>
            <span style="left:45%; animation-delay: 9s; animation-duration: 26s;"></span>
            <span style="left:65%; animation-delay: 2s; animation-duration: 20s;"></span>
            <span style="left:80%; animation-delay: 12s; animation-duration: 24s;"></span>
            <span style="left:92%; animation-delay: 6s; animation-duration: 19s;"></span>
        </div>
    </div>

    <div class="aa-app">

        <!-- Fixed header -->
        <header class="aa-header">
            <div class="aa-hdr-left">
                <button type="button" class="aa-icon-btn" id="aa-menu-btn" aria-label="Chat menu" aria-haspopup="menu" aria-expanded="false">
                    <i class="ri-menu-2-line"></i>
                </button>
                <div class="aa-title">
                    <h1>AI Assistant <i class="ri-sparkling-line aa-spark"></i></h1>
                    <p id="assistant-subtitle">On-device intelligence • Live weather • Your Firestore data</p>
                </div>
            </div>
            <div class="aa-hdr-actions">
                <button type="button" class="aa-icon-btn" id="aa-settings-btn" aria-label="Assistant settings" aria-haspopup="menu" aria-expanded="false"><i class="ri-settings-3-line"></i></button>
                <button type="button" class="aa-icon-btn aa-model-pill" id="ai-model-picker" title="Choose AI model" aria-haspopup="listbox" aria-expanded="false">
                    <span class="aa-pill-label" id="ai-model-badge">Auto</span>
                    <span class="aa-pill-dot"></span>
                </button>
            </div>
        </header>

        <!-- Model picker / chat menu (shared dropdown styling, two separate elements) -->
        <div id="ai-model-menu" class="aa-menu hidden" role="listbox" aria-label="AI model">
            <button type="button" class="aa-menu-opt model-opt" data-model="auto">
                <i class="ri-sparkling-line"></i>
                <div class="aa-menu-meta model-opt-meta"><strong>Auto</strong><span>Cascade — Gemini → Groq → Llama 70B</span></div>
                <i class="ri-check-line aa-menu-check model-opt-check"></i>
            </button>
            <button type="button" class="aa-menu-opt model-opt" data-model="gemini">
                <i class="ri-google-fill"></i>
                <div class="aa-menu-meta model-opt-meta"><strong>Gemini 2.5 Flash</strong><span>Google · multimodal · 1.5k/day</span></div>
                <i class="ri-check-line aa-menu-check model-opt-check"></i>
            </button>
            <button type="button" class="aa-menu-opt model-opt" data-model="groq">
                <i class="ri-flashlight-fill"></i>
                <div class="aa-menu-meta model-opt-meta"><strong>Llama 3.3 70B (Groq)</strong><span>Fastest · 14k/day</span></div>
                <i class="ri-check-line aa-menu-check model-opt-check"></i>
            </button>
            <button type="button" class="aa-menu-opt model-opt" data-model="github">
                <i class="ri-github-fill"></i>
                <div class="aa-menu-meta model-opt-meta"><strong>Llama 70B (GitHub)</strong><span>Backup tier · 150/day</span></div>
                <i class="ri-check-line aa-menu-check model-opt-check"></i>
            </button>
        </div>

        <div id="aa-menu-popover" class="aa-menu hidden" role="menu" aria-label="Chat menu">
            <button type="button" class="aa-menu-opt danger" id="assistant-clear" role="menuitem">
                <i class="ri-delete-bin-line"></i>
                <div class="aa-menu-meta"><strong>Clear chat</strong><span>Archive history and start fresh with the AI</span></div>
            </button>
        </div>

        <!-- Hero: animated AI orb -->
        <section class="aa-hero">
            <div class="aa-orb-wrap" aria-hidden="true">
                <div class="aa-arc"></div>
                <div class="aa-ring r2"></div>
                <div class="aa-ring r1"></div>
                <div class="aa-orb"></div>
                <div class="aa-orb-leaf"><i class="ri-leaf-fill"></i></div>
            </div>
            <h2 class="aa-greet" id="aa-greet">Hello, Farmer <span class="wave">👋</span></h2>
            <p class="aa-sub">Ask anything about your farm.</p>
        </section>

        <!-- Primary CTA -->
        <section class="aa-cards" id="assistant-empty">
            <a href="scanner.html" class="aa-card" id="aa-scan-card">
                <div class="aa-card-icon"><i class="ri-focus-3-line"></i></div>
                <div class="aa-card-body">
                    <div class="aa-card-title">Scan Field</div>
                    <div class="aa-card-desc">Detect issues in your crops instantly with AI.</div>
                </div>
                <div class="aa-card-chev"><i class="ri-arrow-right-s-line"></i></div>
            </a>
            <p id="assistant-companion-hint" class="hidden" style="margin-top:14px;font-size:12px;line-height:1.45;color:rgba(148,163,184,0.95);"></p>
        </section>

        <!-- Chat messages stream into here -->
        <div class="aa-chat" id="assistant-messages"></div>

        <!-- Legacy hidden aside kept so existing assistant.js queries don't error -->
        <aside class="assistant-rail hidden" aria-hidden="true">
            <div class="assistant-rail-card">
                <div class="assistant-rail-title">Live farm context</div>
                <div id="assistant-rail-body" class="assistant-rail-body hidden" aria-live="polite"></div>
            </div>
        </aside>
    </div>

    <!-- Composer -->
    <div class="aa-composer composer">
        <div class="aa-composer-inner composer-inner">
            <!-- Hidden file input kept so existing assistant.js attach handler doesn't error -->
            <input type="file" id="assistant-attach-input" accept="image/*" class="aa-attach-hidden" />
            <button type="button" id="assistant-attach" class="aa-attach-hidden" aria-hidden="true"></button>
            <button type="button" class="aa-mic" id="aa-mic-btn" aria-label="Voice input" title="Voice input">
                <i class="ri-mic-line"></i>
            </button>
            <input class="aa-input input" id="assistant-input" placeholder="Ask anything about your farm…" autocomplete="off" />
            <button class="aa-send send" type="button" id="assistant-send" aria-label="Send" title="Send">
                <i class="ri-arrow-up-line"></i>
            </button>
        </div>
    </div>

    <!-- Scoped 5-tab floating dock (the global .bottom-nav is hidden via CSS).
         The middle Scan tab wraps its icon in an emerald ring (same icon size
         as the other tabs, just a glowing circular border around it). -->
    <nav class="aa-dock" aria-label="Primary">
        <a href="index.html" class="aa-dock-item">
            <i class="ri-home-5-line"></i>
            <span>Home</span>
        </a>
        <a href="fields.html" class="aa-dock-item">
            <i class="ri-leaf-line"></i>
            <span>Fields</span>
        </a>
        <a href="scanner.html" class="aa-dock-item aa-dock-scan" aria-label="Scan">
            <span class="aa-scan-ring"><i class="ri-leaf-fill"></i></span>
        </a>
        <a href="assistant.html" class="aa-dock-item active" aria-current="page">
            <i class="ri-sparkling-line"></i>
            <span>AI</span>
        </a>
        <a href="profile.html" class="aa-dock-item">
            <i class="ri-user-smile-line"></i>
            <span>Profile</span>
        </a>
    </nav>

    <!-- Hidden global 5-tab nav kept for any cross-page JS that might query it -->
    <nav class="bottom-nav hidden" aria-hidden="true">
        <a href="index.html" class="b-nav-item"><i class="ri-home-5-line"></i><span data-i18n="navHome">Home</span></a>
        <a href="fields.html" class="b-nav-item"><i class="ri-leaf-line"></i><span data-i18n="navFields">Fields</span></a>
        <a href="scanner.html" class="b-nav-scan"><i class="ri-leaf-fill"></i></a>
        <a href="assistant.html" class="b-nav-item active"><i class="ri-sparkling-line"></i><span data-i18n="navAi">AI</span></a>
        <a href="profile.html" class="b-nav-item"><i class="ri-user-smile-line"></i><span data-i18n="navProfile">Profile</span></a>
    </nav>

    <script type="module" src="js/assistant.js?v=98"></script>
    <script type="module" src="js/interaction-engine.js?v=20"></script>
</body>
</html>
