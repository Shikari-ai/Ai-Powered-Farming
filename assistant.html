<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script>
    (function () {
      var h = location.hostname || "";
      if (!h.endsWith("github.io")) return;
      var path = location.pathname;
      var parts = path.split("/").filter(Boolean);
      var repo = parts[0];
      if (!repo || repo.indexOf(".") !== -1) return;
      if (path === "/" + repo) {
        location.replace("/" + repo + "/" + location.search + location.hash);
        return;
      }
      var b = document.createElement("base");
      b.href = "/" + repo + "/";
      var head = document.head || document.getElementsByTagName("head")[0];
      if (head) head.insertBefore(b, head.firstChild);
    })();
    </script>
    <!-- interactive-widget=resizes-content tells Chrome/Edge on Android to
         shrink the layout viewport when the on-screen keyboard opens, so
         position:fixed top:0 elements stay anchored to the visible top
         instead of getting hidden behind the keyboard. iOS Safari ignores
         this and falls back to the VisualViewport JS handler in assistant.js. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content">
    <!-- Optional: self-hosted vision API -->
    <!-- <meta name="agri-inference-url" content="https://your-yolo-host"> -->
    <title>AI Assistant - AgriTech AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <link rel="stylesheet" href="css/design-tokens.css?v=2">
    <script src="js/device-adaptive-shell.js?v=1"></script>
    <link rel="stylesheet" href="css/adaptive-shell.css?v=1">
    <link rel="stylesheet" href="css/nav.css">
    <style>
        :root {
            --bg-dark: var(--color-bg-deep);
            --surface: var(--color-surface);
            --surface-glass: rgba(10, 17, 24, 0.6);
            --primary: var(--color-primary);
            --text-main: var(--color-text);
            --text-dim: var(--color-text-muted);
            --border-light: var(--color-border-subtle);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-main); overflow-x: hidden; }
        .app-layout {
            min-height: var(--layout-min-height-fill);
            max-width: var(--layout-max-width);
            margin: 0 auto;
            position: relative;
            background: var(--bg-dark);
            box-shadow: var(--shadow-shell);
            padding-bottom: var(--layout-scroll-bottom-pad);
            overflow-x: hidden;
        }

        /* Fixed header — always visible at the top of the screen, never
           scrolls away with the chat. The .chat-wrap below gets padding-top
           to compensate so messages don't slide under it. */
        .header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 14px 16px;
            position: fixed;
            top: 0; left: 50%;
            transform: translateX(-50%);
            width: 100%; max-width: var(--layout-max-width);
            z-index: 50;
            background: linear-gradient(180deg, rgba(3, 6, 9, 0.94) 0%, rgba(3, 6, 9, 0.80) 100%);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            box-sizing: border-box;
        }
        .header-left { display: flex; gap: 12px; align-items: center; min-width: 0; flex: 1; }
        .header-actions { display: flex; gap: 8px; align-items: center; flex-shrink: 0; }
        .icon-btn { width: 40px; height: 40px; border-radius: 50%; background: var(--surface-glass); border: 1px solid var(--border-light); display:flex; align-items:center; justify-content:center; cursor:pointer; color: white; font-size: 18px; flex-shrink: 0; -webkit-tap-highlight-color: transparent; }
        .icon-btn:active { transform: scale(0.93); }
        .title { min-width: 0; overflow: hidden; }
        .title h2 { font-size: 18px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .title p { font-size: 11px; color: var(--text-dim); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* ── Model picker (header button + dropdown menu) ── */
        .model-picker-btn {
            width: auto !important;
            border-radius: 999px !important;
            padding: 0 12px 0 10px;
            gap: 6px;
            font-size: 15px !important;
            transition: background 0.18s ease, border-color 0.18s ease;
        }
        .model-picker-btn:hover { background: rgba(16, 185, 129, 0.10); border-color: rgba(16, 185, 129, 0.35); }
        .model-picker-btn[aria-expanded="true"] { background: rgba(16, 185, 129, 0.14); border-color: rgba(16, 185, 129, 0.50); }
        .model-badge {
            font-size: 9.5px; font-weight: 700; letter-spacing: 0.6px;
            padding: 2px 7px; border-radius: 999px;
            background: rgba(16, 185, 129, 0.18);
            color: var(--primary);
            border: 1px solid rgba(16, 185, 129, 0.28);
        }
        .model-menu {
            position: absolute; top: 64px; right: 16px;
            z-index: 60;
            min-width: 270px; max-width: calc(100vw - 32px);
            background: rgba(8, 12, 16, 0.96);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
            padding: 6px;
            animation: modelMenuIn 0.14s ease-out;
        }
        @keyframes modelMenuIn { from { opacity: 0; transform: translateY(-6px) scale(0.97); } to { opacity: 1; transform: none; } }
        .model-opt {
            all: unset; cursor: pointer; box-sizing: border-box;
            display: flex; align-items: center; gap: 11px;
            width: 100%; padding: 10px 12px; border-radius: 11px;
            transition: background 0.12s ease;
        }
        .model-opt:hover { background: rgba(16, 185, 129, 0.07); }
        .model-opt > i:first-child { font-size: 18px; color: rgba(255,255,255,0.7); flex-shrink: 0; }
        .model-opt-meta { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 2px; }
        .model-opt-meta strong { font-size: 13px; font-weight: 600; color: #fff; }
        .model-opt-meta span { font-size: 11px; color: var(--text-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .model-opt-check { font-size: 16px; color: var(--primary); opacity: 0; flex-shrink: 0; }
        .model-opt.is-selected { background: rgba(16, 185, 129, 0.10); }
        .model-opt.is-selected .model-opt-check { opacity: 1; }
        .model-opt.is-selected .model-opt-meta strong { color: var(--primary); }

        /* Top padding clears the fixed .header (height ≈ 68px including
           padding + 40px buttons). */
        .chat-wrap { padding: 84px var(--layout-content-pad-x) 0; overflow-x: hidden; }
        .empty { margin: 18px 8px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 18px; padding: 18px; text-align:center; }
        .empty i { font-size: 28px; color: var(--text-dim); }
        .empty p { font-size: 12px; color: var(--text-dim); margin-top: 10px; line-height: 1.45; }
        .empty .cta-row { display:flex; gap:10px; margin-top: 14px; }

        .msg-list { display:flex; flex-direction:column; gap: 10px; padding-bottom: 200px; }
        .msg { max-width: 85%; padding: var(--space-md) var(--space-lg); border-radius: var(--radius-md); border: 1px solid rgba(255,255,255,0.08); background: rgba(255,255,255,0.03); }
        .msg.user { align-self: flex-end; background: rgba(16,185,129,0.10); border-color: rgba(16,185,129,0.25); }
        .msg.assistant { align-self: flex-start; }
        .msg .meta { font-size: 10px; color: var(--text-dim); margin-bottom: 6px; display:flex; justify-content:space-between; gap: 10px;}
        .msg .text { font-size: 13px; line-height: 1.45; color: rgba(255,255,255,0.92); white-space: pre-wrap; }
        .msg.typing { opacity: 0.92; }
        .msg.is-superseded { opacity: 0.62; }
        .msg.is-superseded .text { text-decoration: line-through; text-decoration-color: rgba(255,255,255,0.32); text-decoration-thickness: 1px; }
        .msg-superseded { font-size: 11px; color: var(--text-dim); margin-top: 6px; font-style: italic; letter-spacing: 0.01em; }
        .typing-dots { display: flex; gap: 6px; align-items: center; padding: 6px 0 2px; }
        .typing-dots span {
            width: 7px; height: 7px; border-radius: 50%;
            background: rgba(148, 163, 184, 0.85);
            animation: agriTyping 1.05s ease-in-out infinite;
        }
        .typing-dots span:nth-child(2) { animation-delay: 0.18s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.36s; }
        @keyframes agriTyping {
            0%, 80%, 100% { opacity: 0.3; transform: translateY(0); }
            40% { opacity: 1; transform: translateY(-3px); }
        }

        .msg.streaming-reply {
            border-color: rgba(16, 185, 129, 0.22);
            box-shadow: 0 0 0 1px rgba(16, 185, 129, 0.08);
            transition: box-shadow 0.35s ease, border-color 0.35s ease;
        }
        .msg.streaming-reply.thinking {
            animation: agriThinkPulse 2.4s ease-in-out infinite;
        }
        @keyframes agriThinkPulse {
            0%, 100% { box-shadow: 0 0 0 1px rgba(16, 185, 129, 0.06); }
            50% { box-shadow: 0 0 14px rgba(16, 185, 129, 0.14), 0 0 0 1px rgba(16, 185, 129, 0.1); }
        }
        .stream-thinking-glow {
            height: 3px;
            border-radius: 2px;
            margin: 0 0 8px;
            background: linear-gradient(90deg, transparent, rgba(148, 163, 184, 0.35), transparent);
            background-size: 200% 100%;
            animation: agriShimmer 1.8s ease-in-out infinite;
        }
        .msg.streaming-reply:not(.thinking) .stream-thinking-glow {
            opacity: 0;
            height: 0;
            margin: 0;
            animation: none;
            transition: opacity 0.25s ease;
        }
        @keyframes agriShimmer {
            0% { background-position: 100% 0; opacity: 0.35; }
            100% { background-position: -100% 0; opacity: 0.75; }
        }
        .msg.streaming-reply.stream-speaking {
            animation: none;
            box-shadow: 0 0 0 1px rgba(16, 185, 129, 0.1), 0 0 18px rgba(16, 185, 129, 0.06);
            transition: box-shadow 0.5s ease;
        }
        .msg .text.stream-text-host.is-streaming {
            white-space: pre-wrap;
            contain: layout;
            min-height: 3rem;
        }
        .msg .text.stream-text-host .stream-plain {
            opacity: 0.88;
            transition: opacity 0.4s ease;
        }
        .msg .text.stream-text-host .stream-plain.stream-plain-visible {
            opacity: 1;
        }
        .msg .text.stream-text-host .stream-caret {
            display: inline-block;
            width: 2px;
            height: 1.05em;
            margin-left: 3px;
            vertical-align: -0.14em;
            border-radius: 1px;
            background: linear-gradient(180deg, rgba(16, 185, 129, 0.45), rgba(148, 163, 184, 0.85));
            box-shadow: 0 0 10px rgba(16, 185, 129, 0.22);
            animation: agriCaretPulse 1.15s ease-in-out infinite;
        }
        .msg .text.stream-text-host .stream-caret.stream-caret-out {
            opacity: 0;
            transform: scaleY(0.25);
            animation: none;
            transition: opacity 0.35s ease, transform 0.35s ease;
        }
        @keyframes agriCaretPulse {
            0%, 100% { opacity: 0.55; filter: brightness(0.95); }
            50% { opacity: 1; filter: brightness(1.05); }
        }

        .msg .text.is-rich { white-space: normal; }
        .msg .text.is-rich .assist-pre {
            margin: 8px 0;
            padding: 10px 12px;
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.35);
            border: 1px solid rgba(255, 255, 255, 0.08);
            font-size: 12px;
            line-height: 1.4;
            overflow-x: auto;
        }
        .msg .text.is-rich .assist-pre code {
            white-space: pre-wrap;
            word-break: break-word;
            font-family: ui-monospace, monospace;
            color: rgba(226, 232, 240, 0.95);
        }
        .msg .text.is-rich strong {
            color: rgba(248, 250, 252, 0.98);
            font-weight: 600;
        }

        /* Composer sits above bottom-nav AND above the raised .b-nav-scan circle
           (which translates -24px up out of the nav). The scan circle's outer
           ring extends ~16px further still, so the composer needs ~108px
           clearance above the nav baseline to avoid overlapping. */
        .composer {
            position: fixed; left: 50%; transform: translateX(-50%);
            bottom: calc(108px + env(safe-area-inset-bottom, 0px));
            width: 100%; max-width: var(--layout-max-width);
            padding: var(--space-sm) var(--space-lg);
            background: var(--glass-bg-composer);
            border-top: 1px solid rgba(255,255,255,0.06);
            backdrop-filter: blur(var(--glass-blur-strong));
            -webkit-backdrop-filter: blur(var(--glass-blur-strong));
            z-index: var(--z-composer);
        }
        .composer-inner { display:flex; gap: 10px; align-items:center; }
        .input {
            flex:1; padding: 12px 14px; border-radius: 16px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.10);
            color: white; outline: none;
        }
        .send { width: 44px; height: 44px; border-radius: 16px; border: 1px solid rgba(16,185,129,0.4); background: rgba(16,185,129,0.12); color: var(--primary); cursor:pointer; font-size: 18px; display:flex; align-items:center; justify-content:center; flex-shrink: 0; }
        .attach {
            width: 44px; height: 44px; border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.12);
            background: rgba(255,255,255,0.06);
            color: rgba(255,255,255,0.9);
            cursor:pointer;
            display:flex; align-items:center; justify-content:center;
            flex-shrink: 0;
        }
        .attach.has-file { border-color: rgba(16,185,129,0.55); color: var(--primary); background: rgba(16,185,129,0.08); }
        .hidden { display:none !important; }

        body.assistant-page .app-layout {
            background:
                radial-gradient(ellipse 130% 70% at 50% -15%, rgba(16, 185, 129, 0.075), transparent 52%),
                radial-gradient(ellipse 80% 50% at 100% 40%, rgba(59, 130, 246, 0.04), transparent 45%),
                var(--bg-dark);
            transition: filter 0.6s ease;
        }
        body.assistant-page.assistant-composer-focus .composer {
            border-top-color: rgba(16, 185, 129, 0.12);
            box-shadow: 0 -6px 28px rgba(0, 0, 0, 0.35), 0 -1px 0 rgba(16, 185, 129, 0.09);
        }

        /* ── Mobile keyboard handling ──
           When the user focuses the chat input on a touch device, the
           virtual keyboard rises from the bottom. The bottom-nav and the
           gap we left for the scan circle would push the composer into
           the middle of the screen — ugly. So on touch only:
             • hide the bottom nav (keyboard occupies that space)
             • drop the composer to sit right above the keyboard
           Pointer-fine devices (desktop, hardware keyboard) keep the
           normal layout — no keyboard is rising on them. */
        @media (pointer: coarse) {
            body.assistant-page.assistant-composer-focus .bottom-nav {
                display: none;
            }
            body.assistant-page.assistant-composer-focus .composer {
                bottom: env(safe-area-inset-bottom, 0px);
            }
        }
        body.assistant-page.assistant-composer-focus .app-layout {
            filter: saturate(1.03);
        }
        @media (prefers-reduced-motion: reduce) {
            body.assistant-page .msg.streaming-reply,
            body.assistant-page .stream-caret,
            body.assistant-page .stream-thinking-glow,
            body.assistant-page .typing-dots span {
                animation: none !important;
                transition-duration: 0.01ms !important;
            }
        }

        /* nav styles → css/nav.css */
    </style>
</head>
<body class="assistant-page">
    <div class="app-layout">
        <div class="assistant-surface">
        <header class="header">
            <div class="header-left">
                <div class="icon-btn" role="button" aria-label="Back to home" onclick="window.location.href='index.html'"><i class="ri-arrow-left-line"></i></div>
                <div class="title">
                    <h2>AI Assistant</h2>
                    <p id="assistant-subtitle">Data-driven help for your farm</p>
                </div>
            </div>
            <div class="header-actions">
                <button type="button" class="icon-btn model-picker-btn" id="ai-model-picker" title="Choose AI model" aria-haspopup="listbox" aria-expanded="false">
                    <i class="ri-cpu-line"></i><span id="ai-model-badge" class="model-badge">AUTO</span>
                </button>
                <div class="icon-btn" id="assistant-clear" title="Archive chat (start fresh with AI)" role="button" aria-label="Archive chat"><i class="ri-archive-line"></i></div>
            </div>
        </header>
        <div id="ai-model-menu" class="model-menu hidden" role="listbox" aria-label="AI model">
            <button type="button" class="model-opt" data-model="auto">
                <i class="ri-sparkling-line"></i>
                <div class="model-opt-meta"><strong>Auto</strong><span>Cascade — Gemini → Groq → GPT-4o-mini</span></div>
                <i class="ri-check-line model-opt-check"></i>
            </button>
            <button type="button" class="model-opt" data-model="gemini">
                <i class="ri-google-fill"></i>
                <div class="model-opt-meta"><strong>Gemini 2.5 Flash</strong><span>Google · multimodal · 1.5k/day</span></div>
                <i class="ri-check-line model-opt-check"></i>
            </button>
            <button type="button" class="model-opt" data-model="groq">
                <i class="ri-flashlight-fill"></i>
                <div class="model-opt-meta"><strong>Llama 3.3 70B</strong><span>Groq · fastest · 14k/day</span></div>
                <i class="ri-check-line model-opt-check"></i>
            </button>
            <button type="button" class="model-opt" data-model="github">
                <i class="ri-github-fill"></i>
                <div class="model-opt-meta"><strong>GPT-4o mini</strong><span>GitHub Models · best reasoning · 150/day</span></div>
                <i class="ri-check-line model-opt-check"></i>
            </button>
        </div>

        <div class="chat-wrap">
            <div class="empty" id="assistant-empty">
                <i class="ri-sparkling-line"></i>
                <p>
                    Assistant runs <strong>entirely on your device</strong> — farm engines, memory, and weather intelligence compose each reply. No external chat APIs. Optionally connect <code>agri-inference-url</code> for server disease vision.
                </p>
                <div class="cta-row">
                    <button class="cta" onclick="window.location.href='scanner.html'">Start a scan</button>
                    <button class="cta secondary" onclick="window.location.href='fields.html'">Add a field</button>
                </div>
                <p id="assistant-companion-hint" class="hidden" style="margin-top:14px;font-size:12px;line-height:1.45;color:rgba(148,163,184,0.95);text-align:left;"></p>
            </div>

            <div class="msg-list" id="assistant-messages"></div>
        </div>

        <aside class="assistant-rail" aria-label="Live farm intelligence context">
            <div class="assistant-rail-card">
                <div class="assistant-rail-title">Live farm context</div>
                <div id="assistant-rail-body" class="assistant-rail-body hidden" aria-live="polite"></div>
            </div>
        </aside>
        </div>
    </div>

    <div class="composer">
        <div class="composer-inner">
            <input type="file" id="assistant-attach-input" accept="image/*" class="hidden" />
            <button type="button" class="attach" id="assistant-attach" title="Attach crop photo" aria-label="Attach crop photo"><i class="ri-image-add-line"></i></button>
            <input class="input" id="assistant-input" placeholder="Ask about irrigation, disease risk, pests, yields…" />
            <button class="send" type="button" id="assistant-send" title="Send"><i class="ri-send-plane-2-line"></i></button>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="index.html" class="b-nav-item">
            <i class="ri-home-5-line"></i>
            <span data-i18n="navHome">Home</span>
        </a>
        <a href="fields.html" class="b-nav-item">
            <i class="ri-leaf-line"></i>
            <span data-i18n="navFields">Fields</span>
        </a>
        <a href="scanner.html" class="b-nav-scan">
            <i class="ri-leaf-fill"></i>
        </a>
        <a href="assistant.html" class="b-nav-item active">
            <i class="ri-sparkling-line"></i>
            <span data-i18n="navAi">AI</span>
        </a>
        <a href="profile.html" class="b-nav-item">
            <i class="ri-user-smile-line"></i>
            <span data-i18n="navProfile">Profile</span>
        </a>
    </nav>

    <script type="module" src="js/assistant.js?v=94"></script>
    <script type="module" src="js/interaction-engine.js?v=20"></script>
</body>
</html>
