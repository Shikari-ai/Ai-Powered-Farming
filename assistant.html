<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script>
    (function () {
      var h = location.hostname || "";
      if (!h.endsWith("github.io")) return;
      var path = location.pathname;
      var parts = path.split("/").filter(Boolean);
      var repo = parts[0];
      if (!repo || repo.indexOf(".") !== -1) return;
      if (path === "/" + repo) {
        location.replace("/" + repo + "/" + location.search + location.hash);
        return;
      }
      var b = document.createElement("base");
      b.href = "/" + repo + "/";
      var head = document.head || document.getElementsByTagName("head")[0];
      if (head) head.insertBefore(b, head.firstChild);
    })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- Optional: self-hosted vision API -->
    <!-- <meta name="agri-inference-url" content="https://your-yolo-host"> -->
    <title>AI Assistant - AgriTech AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <link rel="stylesheet" href="css/design-tokens.css?v=2">
    <script src="js/device-adaptive-shell.js?v=1"></script>
    <link rel="stylesheet" href="css/adaptive-shell.css?v=1">
    <link rel="stylesheet" href="css/nav.css">
    <style>
        :root {
            --bg-dark: var(--color-bg-deep);
            --surface: var(--color-surface);
            --surface-glass: rgba(10, 17, 24, 0.6);
            --primary: var(--color-primary);
            --text-main: var(--color-text);
            --text-dim: var(--color-text-muted);
            --border-light: var(--color-border-subtle);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-main); overflow-x: hidden; }
        .app-layout {
            min-height: var(--layout-min-height-fill);
            max-width: var(--layout-max-width);
            margin: 0 auto;
            position: relative;
            background: var(--bg-dark);
            box-shadow: var(--shadow-shell);
            padding-bottom: var(--layout-scroll-bottom-pad);
            overflow-x: hidden;
        }

        .header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 18px 20px;
            position: static;
            background: transparent;
        }
        .header-left { display: flex; gap: 12px; align-items: center; }
        .icon-btn { width: 40px; height: 40px; border-radius: 50%; background: var(--surface-glass); border: 1px solid var(--border-light); display:flex; align-items:center; justify-content:center; cursor:pointer; color: white; font-size: 18px; }
        .title h2 { font-size: 18px; font-weight: 600; }
        .title p { font-size: 11px; color: var(--text-dim); margin-top: 2px; }

        .chat-wrap { padding: var(--space-lg) var(--layout-content-pad-x) 0; overflow-x: hidden; }
        .empty { margin: 18px 8px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 18px; padding: 18px; text-align:center; }
        .empty i { font-size: 28px; color: var(--text-dim); }
        .empty p { font-size: 12px; color: var(--text-dim); margin-top: 10px; line-height: 1.45; }
        .empty .cta-row { display:flex; gap:10px; margin-top: 14px; }

        .msg-list { display:flex; flex-direction:column; gap: 10px; padding-bottom: 140px; }
        .msg { max-width: 85%; padding: var(--space-md) var(--space-lg); border-radius: var(--radius-md); border: 1px solid rgba(255,255,255,0.08); background: rgba(255,255,255,0.03); }
        .msg.user { align-self: flex-end; background: rgba(16,185,129,0.10); border-color: rgba(16,185,129,0.25); }
        .msg.assistant { align-self: flex-start; }
        .msg .meta { font-size: 10px; color: var(--text-dim); margin-bottom: 6px; display:flex; justify-content:space-between; gap: 10px;}
        .msg .text { font-size: 13px; line-height: 1.45; color: rgba(255,255,255,0.92); white-space: pre-wrap; }
        .msg.typing { opacity: 0.92; }
        .msg.is-superseded { opacity: 0.62; }
        .msg.is-superseded .text { text-decoration: line-through; text-decoration-color: rgba(255,255,255,0.32); text-decoration-thickness: 1px; }
        .msg-superseded { font-size: 11px; color: var(--text-dim); margin-top: 6px; font-style: italic; letter-spacing: 0.01em; }
        .typing-dots { display: flex; gap: 6px; align-items: center; padding: 6px 0 2px; }
        .typing-dots span {
            width: 7px; height: 7px; border-radius: 50%;
            background: rgba(148, 163, 184, 0.85);
            animation: agriTyping 1.05s ease-in-out infinite;
        }
        .typing-dots span:nth-child(2) { animation-delay: 0.18s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.36s; }
        @keyframes agriTyping {
            0%, 80%, 100% { opacity: 0.3; transform: translateY(0); }
            40% { opacity: 1; transform: translateY(-3px); }
        }

        .msg.streaming-reply {
            border-color: rgba(16, 185, 129, 0.22);
            box-shadow: 0 0 0 1px rgba(16, 185, 129, 0.08);
            transition: box-shadow 0.35s ease, border-color 0.35s ease;
        }
        .msg.streaming-reply.thinking {
            animation: agriThinkPulse 2.4s ease-in-out infinite;
        }
        @keyframes agriThinkPulse {
            0%, 100% { box-shadow: 0 0 0 1px rgba(16, 185, 129, 0.06); }
            50% { box-shadow: 0 0 14px rgba(16, 185, 129, 0.14), 0 0 0 1px rgba(16, 185, 129, 0.1); }
        }
        .stream-thinking-glow {
            height: 3px;
            border-radius: 2px;
            margin: 0 0 8px;
            background: linear-gradient(90deg, transparent, rgba(148, 163, 184, 0.35), transparent);
            background-size: 200% 100%;
            animation: agriShimmer 1.8s ease-in-out infinite;
        }
        .msg.streaming-reply:not(.thinking) .stream-thinking-glow {
            opacity: 0;
            height: 0;
            margin: 0;
            animation: none;
            transition: opacity 0.25s ease;
        }
        @keyframes agriShimmer {
            0% { background-position: 100% 0; opacity: 0.35; }
            100% { background-position: -100% 0; opacity: 0.75; }
        }
        .msg.streaming-reply.stream-speaking {
            animation: none;
            box-shadow: 0 0 0 1px rgba(16, 185, 129, 0.1), 0 0 18px rgba(16, 185, 129, 0.06);
            transition: box-shadow 0.5s ease;
        }
        .msg .text.stream-text-host.is-streaming {
            white-space: pre-wrap;
            contain: layout;
            min-height: 3rem;
        }
        .msg .text.stream-text-host .stream-plain {
            opacity: 0.88;
            transition: opacity 0.4s ease;
        }
        .msg .text.stream-text-host .stream-plain.stream-plain-visible {
            opacity: 1;
        }
        .msg .text.stream-text-host .stream-caret {
            display: inline-block;
            width: 2px;
            height: 1.05em;
            margin-left: 3px;
            vertical-align: -0.14em;
            border-radius: 1px;
            background: linear-gradient(180deg, rgba(16, 185, 129, 0.45), rgba(148, 163, 184, 0.85));
            box-shadow: 0 0 10px rgba(16, 185, 129, 0.22);
            animation: agriCaretPulse 1.15s ease-in-out infinite;
        }
        .msg .text.stream-text-host .stream-caret.stream-caret-out {
            opacity: 0;
            transform: scaleY(0.25);
            animation: none;
            transition: opacity 0.35s ease, transform 0.35s ease;
        }
        @keyframes agriCaretPulse {
            0%, 100% { opacity: 0.55; filter: brightness(0.95); }
            50% { opacity: 1; filter: brightness(1.05); }
        }

        .msg .text.is-rich { white-space: normal; }
        .msg .text.is-rich .assist-pre {
            margin: 8px 0;
            padding: 10px 12px;
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.35);
            border: 1px solid rgba(255, 255, 255, 0.08);
            font-size: 12px;
            line-height: 1.4;
            overflow-x: auto;
        }
        .msg .text.is-rich .assist-pre code {
            white-space: pre-wrap;
            word-break: break-word;
            font-family: ui-monospace, monospace;
            color: rgba(226, 232, 240, 0.95);
        }
        .msg .text.is-rich strong {
            color: rgba(248, 250, 252, 0.98);
            font-weight: 600;
        }

        /* Layering: composer above bottom nav chrome — see css/design-tokens.css z-index notes */
        .composer {
            position: fixed; left: 50%; transform: translateX(-50%);
            bottom: calc(72px + env(safe-area-inset-bottom, 0px));
            width: 100%; max-width: var(--layout-max-width);
            padding: var(--space-sm) var(--space-lg);
            background: var(--glass-bg-composer);
            border-top: 1px solid rgba(255,255,255,0.06);
            backdrop-filter: blur(var(--glass-blur-strong));
            -webkit-backdrop-filter: blur(var(--glass-blur-strong));
            z-index: var(--z-composer);
        }
        .composer-inner { display:flex; gap: 10px; align-items:center; }
        .input {
            flex:1; padding: 12px 14px; border-radius: 16px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.10);
            color: white; outline: none;
        }
        .send { width: 44px; height: 44px; border-radius: 16px; border: 1px solid rgba(16,185,129,0.4); background: rgba(16,185,129,0.12); color: var(--primary); cursor:pointer; font-size: 18px; display:flex; align-items:center; justify-content:center; flex-shrink: 0; }
        .attach {
            width: 44px; height: 44px; border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.12);
            background: rgba(255,255,255,0.06);
            color: rgba(255,255,255,0.9);
            cursor:pointer;
            display:flex; align-items:center; justify-content:center;
            flex-shrink: 0;
        }
        .attach.has-file { border-color: rgba(16,185,129,0.55); color: var(--primary); background: rgba(16,185,129,0.08); }
        .hidden { display:none !important; }

        body.assistant-page .app-layout {
            background:
                radial-gradient(ellipse 130% 70% at 50% -15%, rgba(16, 185, 129, 0.075), transparent 52%),
                radial-gradient(ellipse 80% 50% at 100% 40%, rgba(59, 130, 246, 0.04), transparent 45%),
                var(--bg-dark);
            transition: filter 0.6s ease;
        }
        body.assistant-page.assistant-composer-focus .composer {
            border-top-color: rgba(16, 185, 129, 0.12);
            box-shadow: 0 -6px 28px rgba(0, 0, 0, 0.35), 0 -1px 0 rgba(16, 185, 129, 0.09);
        }
        body.assistant-page.assistant-composer-focus .app-layout {
            filter: saturate(1.03);
        }
        @media (prefers-reduced-motion: reduce) {
            body.assistant-page .msg.streaming-reply,
            body.assistant-page .stream-caret,
            body.assistant-page .stream-thinking-glow,
            body.assistant-page .typing-dots span {
                animation: none !important;
                transition-duration: 0.01ms !important;
            }
        }

        /* nav styles → css/nav.css */
    </style>
</head>
<body>
    <div class="app-layout">
        <div class="assistant-surface">
        <header class="header">
            <div class="header-left">
                <div class="icon-btn" onclick="window.location.href='fields.html'"><i class="ri-arrow-left-line"></i></div>
                <div class="title">
                    <h2>AI Assistant</h2>
                    <p id="assistant-subtitle">Data-driven help for your farm</p>
                </div>
            </div>
            <div class="icon-btn" id="assistant-clear" title="Clear chat"><i class="ri-delete-bin-6-line"></i></div>
        </header>

        <div class="chat-wrap">
            <div class="empty" id="assistant-empty">
                <i class="ri-sparkling-line"></i>
                <p>
                    Assistant runs <strong>entirely on your device</strong> — farm engines, memory, and weather intelligence compose each reply. No external chat APIs. Optionally connect <code>agri-inference-url</code> for server disease vision.
                </p>
                <div class="cta-row">
                    <button class="cta" onclick="window.location.href='scanner.html'">Start a scan</button>
                    <button class="cta secondary" onclick="window.location.href='fields.html'">Add a field</button>
                </div>
                <p id="assistant-companion-hint" class="hidden" style="margin-top:14px;font-size:12px;line-height:1.45;color:rgba(148,163,184,0.95);text-align:left;"></p>
            </div>

            <div class="msg-list" id="assistant-messages"></div>
        </div>

        <aside class="assistant-rail" aria-label="Live farm intelligence context">
            <div class="assistant-rail-card">
                <div class="assistant-rail-title">Live farm context</div>
                <div id="assistant-rail-body" class="assistant-rail-body hidden" aria-live="polite"></div>
            </div>
        </aside>
        </div>
    </div>

    <div class="composer">
        <div class="composer-inner">
            <input type="file" id="assistant-attach-input" accept="image/*" class="hidden" />
            <button type="button" class="attach" id="assistant-attach" title="Attach crop photo" aria-label="Attach crop photo"><i class="ri-image-add-line"></i></button>
            <input class="input" id="assistant-input" placeholder="Ask about irrigation, disease risk, pests, yields…" />
            <button class="send" type="button" id="assistant-send" title="Send"><i class="ri-send-plane-2-line"></i></button>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="index.html" class="b-nav-item">
            <i class="ri-home-5-line"></i>
            <span data-i18n="navHome">Home</span>
        </a>
        <a href="fields.html" class="b-nav-item">
            <i class="ri-leaf-line"></i>
            <span data-i18n="navFields">Fields</span>
        </a>
        <a href="scanner.html" class="b-nav-scan">
            <i class="ri-leaf-fill"></i>
        </a>
        <a href="assistant.html" class="b-nav-item active">
            <i class="ri-sparkling-line"></i>
            <span data-i18n="navAi">AI</span>
        </a>
        <a href="profile.html" class="b-nav-item">
            <i class="ri-user-smile-line"></i>
            <span data-i18n="navProfile">Profile</span>
        </a>
    </nav>

    <script type="module" src="js/assistant.js?v=97"></script>
    <script type="module" src="js/interaction-engine.js?v=20"></script>
</body>
</html>
