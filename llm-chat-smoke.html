<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>5-turn LLM smoke (same stack as assistant)</title>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 560px; margin: 24px auto; padding: 0 12px;
            background: #0a0f14; color: #e2e8f0; }
        h1 { font-size: 1rem; font-weight: 600; color: #94a3b8; }
        code { font-size: 0.85em; }
        .msg { margin: 12px 0; padding: 12px 14px; border-radius: 12px; font-size: 14px; line-height: 1.45; }
        .user { background: rgba(16, 185, 129, 0.12); border: 1px solid rgba(16, 185, 129, 0.28); }
        .assistant { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.08); }
        .meta { background: rgba(148, 163, 184, 0.1); border: 1px solid rgba(148, 163, 184, 0.2); color: #cbd5e1; font-size: 12px; }
        .err { border-color: rgba(248, 113, 113, 0.45); color: #fca5a5; }
        .role { font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; color: #64748b; margin-bottom: 6px; }
    </style>
</head>
<body>
    <h1>Five turns via <code>callLlmProxy</code> → local <code>POST /v1/chat/grounded</code> (run <code>npm run api</code> first)</h1>
    <div id="log" aria-live="polite"></div>
    <script type="module">
        import { callLlmProxy } from "./js/ai/llm-proxy.js?v=59";

        const el = document.getElementById("log");

        function row(kind, role, text) {
            const d = document.createElement("div");
            d.className = "msg " + kind;
            const esc = String(text ?? "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
            d.innerHTML = `<div class="role">${role}</div><div class="body">${esc}</div>`;
            el.appendChild(d);
        }

        const prompts = [
            "Hello — in one short sentence, what should you do if the evidence bundle has no farm data?",
            "Define NDVI in one line for a farmer.",
            "If evidence shows no weather sync, how do you answer a brief irrigation question? One sentence.",
            "In ≤15 words: what tone should you use?",
            "Goodbye — confirm you only use facts from the evidence JSON.",
        ];

        const bundle = {
            turnKind: "casual",
            locale: "en",
            reasoningDepth: 1,
            companion: {},
        };

        row("meta", "run", "Starting 5 scripted turns…");

        for (let i = 0; i < prompts.length; i++) {
            const q = prompts[i];
            row("user", `turn ${i + 1} — user`, q);
            try {
                const res = await callLlmProxy({ question: q, locale: "en", bundle });
                const reply = (res.text || "").trim() || "(empty reply)";
                row("assistant", `turn ${i + 1} — assistant`, reply);
            } catch (e) {
                row("assistant err", `turn ${i + 1} — assistant`, (e && e.message) || String(e));
            }
            await new Promise((r) => setTimeout(r, 300));
        }
        row("meta", "done", "Finished.");
    </script>
</body>
</html>
